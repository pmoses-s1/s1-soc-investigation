name: 'DFIR: Insider Threat Matrix Detections'
queries:
- id: dt001_consolehost_history_recreated
  title: ConsoleHost_history.txt created/deleted (possible anti-forensics)
  pq: 'tgt.file.path contains ''ConsoleHost_history.txt'' event.type in (''File Creation'',''File Deletion'') (endpoint.name contains:anycase("{{entity}}") || src.process.user contains:anycase("{{entity}}")) | group hits=count() by event_day=strftime(timestamp, "%Y-%m-%d") | sort event_day

    '
  merge:
    kind: aggregate
    key_cols:
    - event_day
    sum_cols:
    - hits
  scope: subject
- id: dt002_consolehost_history_missing
  title: ConsoleHost_history.txt deletion events
  pq: 'tgt.file.path contains ''ConsoleHost_history.txt'' event.type = ''File Deletion'' (endpoint.name contains:anycase("{{entity}}") || src.process.user contains:anycase("{{entity}}")) | group hits=count() by event_day=strftime(timestamp, "%Y-%m-%d") | sort event_day

    '
  merge:
    kind: aggregate
    key_cols:
    - event_day
    sum_cols:
    - hits
  scope: subject
