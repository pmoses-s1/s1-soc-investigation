  pq: serverHost='{{src_prompt_security|prompt-security}}' log.user='{{entity}}' | let ts=(log.timestamp || log.event_time || event_time || timestamp || sca:ingestTime) | sort -ts | nolimit | columns Time=simpledateformat(ts,'yyyy-MM-dd HH:mm:ss'), User=log.user, App=log.application.name, Direction=log.direction, EventType=log.eventType, Domain=log.sensor.pageDomain, Policy=log.policyName, IP=log.ipAddress, ConvID=log.conversationId
  merge:
