name: 'DFIR: AI & Prompt Security'
queries:
- id: git-03-2
  title: GitHub Token / OAuth Activity
  notes: 'Were PATs/OAuth/GitHub Apps used or modified? | Source: ghe_server_prod/github_org_auth/github_s3 | Pivot if positive: Scope by hashed_token across all GitHub events'
  pq: |-
    serverHost in ('ghe_server_prod','github_org_auth','github_s3')
    | filter actor contains:anycase('{{username}}') OR actor.email contains:anycase('{{entity}}')
    | filter action contains:anycase('token') OR action contains:anycase('oauth') OR programmatic_access_type = *
    | sort -timestamp
    | limit 2000
    | columns Time=simpledateformat(timestamp,'yyyy-MM-dd HH:mm:ss'), Actor=actor, Action=action, Repo=repo, IP=actor_ip, TokenType=programmatic_access_type, Token=hashed_token, Scopes=token_scopes, UA=user_agent
  merge:
    kind: append
- id: sec-01-2
  title: 1Password Sign-ins and Item Usage
  notes: 'Source: 1password | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_1password|1password}}' | filter target_user.email contains:anycase('{{entity}}') OR user.email contains:anycase('{{entity}}') | sort -timestamp | nolimit | columns Time=simpledateformat(timestamp,'yyyy-MM-dd HH:mm:ss'), Actor=user.email, Target=target_user.email, Action=action, Category=category, Client=client.app_name, IP=client.ip_address, Country=location.country, Vault=vault_uuid, Item=item_uuid
  merge:
    kind: append
- id: edr-02-2
  title: Archive / Compression Tool Usage
  notes: 'Source: all | Imported/generated for SOC investigation library.'
  pq: '| filter event.type == ''Process Creation'' | filter src.process.user contains:anycase(''{{entity}}'') OR tgt.process.user contains:anycase(''{{entity}}'') | filter src.process.name contains:anycase(''7z'') OR src.process.name contains:anycase(''rar'') OR src.process.name contains:anycase(''winzip'') OR src.process.name contains:anycase(''tar'') OR src.process.name contains:anycase(''powershell'') OR tgt.process.name contains:anycase(''7z'') OR tgt.process.name contains:anycase(''rar'') OR tgt.process.cmdline contains:anycase(''compress'') OR tgt.process.cmdline contains:anycase(''archive'') | let ts=(timestamp || event.time || sca:ingestTime) | sort -ts | nolimit | columns Time=simpledateformat(ts,''yyyy-MM-dd HH:mm:ss''), Endpoint=endpoint.name, User=src.process.user, Process=src.process.name, Cmd=src.process.cmdline'
  merge:
    kind: append
- id: atl-03-2
  title: Atlassian API Token / Admin Changes
  notes: 'Source: atlassian-cloud-enterprise | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_atlassian_cloud_enterprise|atlassian-cloud-enterprise}}' | filter actor.email contains:anycase('{{entity}}') OR actor.name contains:anycase('{{entity}}') | filter action contains:anycase('token') OR action contains:anycase('admin') OR action contains:anycase('group') OR action contains:anycase('permission') | sort -timestamp | nolimit | columns Time=simpledateformat(timestamp,'yyyy-MM-dd HH:mm:ss'), Actor=actor.email, Action=action, IP=location.ip, Token=actor.tokenLabel, Changes=changedValues, Context=context
  merge:
    kind: append
- id: azr-01-2
  title: Azure Sign-In Activity — Location and App
  notes: 'Source: Azure | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_azure|Azure}}' UserPrincipalName='{{entity}}' | let ts=(timestamp || createdDateTime || sca:ingestTime) | sort -ts | nolimit | columns Time=simpledateformat(ts,'yyyy-MM-dd HH:mm:ss'), User=UserPrincipalName, App=AppDisplayName, IP=IPAddress, City=LocationDetails.city, Country=LocationDetails.countryOrRegion, Status=ResultType, Device=DeviceDetail.displayName, OS=DeviceDetail.operatingSystem
  merge:
    kind: append
- id: sto-02-2
  title: Box Downloads / Sharing
  notes: 'Source: box | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_box|box}}' | filter created_by.login contains:anycase('{{entity}}') OR actor.email contains:anycase('{{entity}}') | filter event_type contains:anycase('download') OR event_type contains:anycase('share') OR event_type contains:anycase('collaboration') OR event_type contains:anycase('link') | sort -timestamp | nolimit | columns Time=simpledateformat(timestamp,'yyyy-MM-dd HH:mm:ss'), Actor=created_by.login, Event=event_type, Item=source.name, Size=additional_details.size, IP=ip_address, Service=additional_details.service_name
  merge:
    kind: append
- id: imported-searches-box-search-25
  title: Box search 25
  notes: 'Source: box | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_box|box}}' message contains:anycase '{{entity}}' | columns timestamp, message | sort -timestamp | nolimit
  merge:
    kind: append
- id: edr-03-2
  title: Cloud Transfer / Exfil Tooling
  notes: 'Source: all | Imported/generated for SOC investigation library.'
  pq: '| filter event.type == ''Process Creation'' | filter src.process.user contains:anycase(''{{entity}}'') OR tgt.process.user contains:anycase(''{{entity}}'') | filter src.process.name contains:anycase(''rclone'') OR src.process.name contains:anycase(''aws'') OR src.process.name contains:anycase(''gsutil'') OR src.process.name contains:anycase(''curl'') OR src.process.name contains:anycase(''wget'') OR src.process.name contains:anycase(''megasync'') OR tgt.process.cmdline contains:anycase(''rclone'') OR tgt.process.cmdline contains:anycase(''aws s3'') OR tgt.process.cmdline contains:anycase(''gsutil'') OR tgt.process.cmdline contains:anycase(''createUploadSession'') OR tgt.process.cmdline contains:anycase(''dropboxapi'') | let ts=(timestamp || event.time || sca:ingestTime) | sort -ts | nolimit | columns Time=simpledateformat(ts,''yyyy-MM-dd HH:mm:ss''), Endpoint=endpoint.name, User=src.process.user, Process=src.process.name, Cmd=src.process.cmdline'
  merge:
    kind: append
- id: atl-02-2
  title: Confluence Space Exports / Jira Bulk
  notes: 'Source: all | Imported/generated for SOC investigation library.'
  pq: serverHost in ('confluence-cloud','jira','atlassian-cloud-enterprise') | filter actor.email contains:anycase('{{entity}}') OR actor.name contains:anycase('{{entity}}') | filter action contains:anycase('export') OR action contains:anycase('download') OR action contains:anycase('attachment') OR event.name contains:anycase('export') | sort -timestamp | nolimit | columns Time=simpledateformat(timestamp,'yyyy-MM-dd HH:mm:ss'), Source=serverHost, Actor=actor.email, Action=action, Object=object, IP=location.ip, Method=method
  merge:
    kind: append
- id: imported-searches-data-movement-search-34
  title: Data Movement search 34
  notes: 'Source: all | Imported/generated for SOC investigation library.'
  pq: (actor.email contains:anycase '{{entity}}' OR actor.alternateId contains:anycase '{{entity}}' OR src.process.user contains:anycase '{{entity}}' OR message contains:anycase '{{entity}}') (event.name contains:anycase ('download','upload','export','share','permission') OR eventType contains:anycase ('download','export','share') OR message contains:anycase ('download','upload','export','share','permission')) | columns timestamp, serverHost, actor.email, actor.alternateId, event.name, eventType, ipAddress, client.ipAddress, event.doc_title, tgt.file.path | sort -timestamp | nolimit
  merge:
    kind: append
- id: imported-searches-data-movement-search-38
  title: Data Movement search 38
  notes: 'Source: all | Imported/generated for SOC investigation library.'
  pq: '"(actor.email contains:anycase ''{{entity}}'' OR actor.alternateId contains:anycase ''{{entity}}'' OR src.process.user contains:anycase ''{{entity}}'' OR message contains:anycase ''{{entity}}'') (event.name contains:anycase (''download'',''upload'',''export'',''share'',''permission'') OR eventType contains:anycase (''download'',''export'',''share'') OR message contains:anycase (''download'',''upload'',''export'',''share'',''permission'')) | columns timestamp, serverHost, actor.email, actor.alternateId, event.name, eventType, ipAddress, client.ipAddress, event.doc_title, tgt.file.path | sort -timestamp | nolimit"|nolimit'
  merge:
    kind: append
- id: edr-07-2
  title: Downloads / Desktop Temp — Sensitive File Staging
  notes: 'Source: all | Imported/generated for SOC investigation library.'
  pq: '| filter event.type in (''File Creation'',''File Modification'') | filter src.process.user contains:anycase(''{{entity}}'') | filter tgt.file.path contains:anycase(''\\Downloads\\'') OR tgt.file.path contains:anycase(''\\Desktop\\'') OR tgt.file.path contains:anycase(''\\Temp\\'') OR tgt.file.path contains:anycase(''/Downloads/'') OR tgt.file.path contains:anycase(''/Desktop/'') | filter tgt.file.extension in:anycase (''pdf'',''docx'',''xlsx'',''pptx'',''csv'',''zip'',''7z'',''rar'',''pst'',''msg'') | let ts=(timestamp || event.time || sca:ingestTime) | sort -ts | nolimit | columns Time=simpledateformat(ts,''yyyy-MM-dd HH:mm:ss''), Endpoint=endpoint.name, User=src.process.user, File=tgt.file.path, SizeMB=tgt.file.size/1048576, Process=src.process.name'
  merge:
    kind: append
- id: dlp-03-2
  title: Endpoint Archive / Staging Indicators
  notes: 'Source: edr | Imported/generated for SOC investigation library.'
  pq: '| filter agent.uuid == ''{{entity}}'' OR src.process.user contains:anycase(''{{entity}}'') | filter tgt.file.path matches ''(?i).*(\.zip|\.7z|\.rar|\.tar|\.gz)$'' OR src.process.cmdline matches ''(?i).*(zip|7z|rar|tar|Compress-Archive|scp|rsync|rclone|curl|wget).*'' | sort -timestamp | nolimit | columns Time=simpledateformat(timestamp,''yyyy-MM-dd HH:mm:ss''), Endpoint=endpoint.name, User=src.process.user, Event=event.type, Process=src.process.image.path, Cmd=src.process.cmdline, File=tgt.file.path, DstIP=dst.ip.address, DNS=dns.request'
  merge:
    kind: append
- id: saa-02-2
  title: Figma Export / Link Changes
  notes: 'Source: figma | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_figma|figma}}' | filter actor.email contains:anycase('{{entity}}') | filter action.type contains:anycase('export') OR action.type contains:anycase('download') OR action.type contains:anycase('link') OR action.type contains:anycase('access_token') | sort -timestamp | nolimit | columns Time=simpledateformat(timestamp,'yyyy-MM-dd HH:mm:ss'), Actor=actor.email, Action=action.type, Entity=entity.type, Key=entity.key, IP=context.ip_address, Client=context.client_name
  merge:
