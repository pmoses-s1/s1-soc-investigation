- id: edr-04-2
  title: Large File Creation > 50MB
  notes: 'Source: all | Imported/generated for SOC investigation library.'
  pq: '| filter event.type in (''File Creation'',''File Modification'') | filter tgt.file.size > 50000000 | filter src.process.user contains:anycase(''{{entity}}'') | filter tgt.file.extension in:anycase (''zip'',''7z'',''rar'',''tar'',''gz'',''tgz'',''csv'',''xlsx'',''xls'',''pdf'',''docx'',''pptx'',''json'',''sql'') | let ts=(timestamp || event.time || sca:ingestTime) | sort -ts | nolimit | columns Time=simpledateformat(ts,''yyyy-MM-dd HH:mm:ss''), Endpoint=endpoint.name, User=src.process.user, File=tgt.file.path, SizeMB=tgt.file.size/1048576, Process=src.process.name'
  merge:
    kind: append
- id: edr-05-2
  title: Login Events — All Endpoints
  notes: 'Source: edr | Imported/generated for SOC investigation library.'
  pq: '| filter event.type == ''Login'' AND event.login.userName contains:anycase(''{{entity}}'') | let ts=(timestamp || event.time || sca:ingestTime) | group Events=count(), FirstSeen.timestamp=min(ts), LastSeen.timestamp=max(ts), LoginTypes=array_agg_distinct(event.login.type, 5) by Endpoint=endpoint.name, AgentUUID=agent.uuid, Site=site.name | sort -Events | nolimit'
  merge:
    kind: aggregate
    key_cols:
    - Endpoint
    - AgentUUID
    - Site
    sum_cols:
    - Events
    min_cols:
    - FirstSeen.timestamp
    max_cols:
    - LastSeen.timestamp
    array_cols:
    - LoginTypes
