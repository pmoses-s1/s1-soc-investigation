- id: dash-3-ai-genai-hunting-ai-applications-installed
  title: AI Applications Installed
  notes: Imported from dashboard 'S1 Threat Hunting and Block Candidate Dashboard - software, domains, AI, VPN, remote access, file sharing, and anti-forensics review.' tab '3. AI / GenAI Hunting'.
  pq: serverHost='{{src_oplockdown|oplockdown}}' | filter tag in ('AI-IDE','AI-MISUSE') OR app_name contains:anycase('Cursor','Perplexity','Claude','ChatGPT','Windsurf','Copilot','Gemini','Antigravity') | group Endpoints=estimate_distinct(endpoint.name), Users=estimate_distinct(owner), LastSeen.timestamp=max(lastseen) by app_name, tag | sort -Endpoints | limit 500
  merge:
    kind: aggregate
    key_cols:
    - app_name
    - tag
    max_cols:
    - LastSeen.timestamp
- id: dash-3-ai-genai-hunting-prompt-security-violations
  title: Prompt Security Violations
  notes: Imported from dashboard 'S1 Threat Hunting and Block Candidate Dashboard - software, domains, AI, VPN, remote access, file sharing, and anti-forensics review.' tab '3. AI / GenAI Hunting'.
  pq: serverHost='{{src_prompt_security|prompt-security}}' | filter log.isValid == true | let ts=(log.timestamp || log.event_time || event_time || timestamp || ReceiveTime) | filter log.violations = * OR log.violationFindingsDetails.Secrets = * OR log.violationFindingsDetails.Sensitive_Data = * OR log.violationFindingsDetails.Harmful_Content_Moderator = * | group violations=count(), users=estimate_distinct(log.user) by log.application.name, log.policyName | sort -violations | limit 500
  merge:
    kind: aggregate
    key_cols:
    - log.application.name
    - log.policyName
    sum_cols:
    - violations
- id: dash-4-remote-access-vpn-p2p-remote-access-vpn-p2p-executed
  title: Remote Access / VPN / P2P Executed
  notes: Imported from dashboard 'S1 Threat Hunting and Block Candidate Dashboard - software, domains, AI, VPN, remote access, file sharing, and anti-forensics review.' tab '4. Remote Access / VPN / P2P'.
  pq: event.type in ('Process Creation','Process','Process Start') | let ts=(event.time || event_time || timestamp || ReceiveTime) | let User=(user.name || src.process.user || event.login.userName || '') | let Proc=(process.name || src.process.name || tgt.process.name || '') | let Cmd=(process.cmdline || src.process.cmdline || tgt.process.cmdline || '') | filter Proc contains:anycase('teamviewer','anydesk','rustdesk','screenconnect','connectwise','logmein','bomgar','beyondtrust','splashtop','vnc','tailscale','openvpn','wireguard','nordvpn','expressvpn','protonvpn','surfshark','utorrent','qbittorrent','transmission') OR Cmd contains:anycase('teamviewer','anydesk','rustdesk','tailscale','openvpn','wireguard','nordvpn','utorrent','qbittorrent','transmission') | columns ts.timestamp=ts, User, endpoint.name, agent.uuid, Proc, Cmd | sort -ts.timestamp | limit 3000
  merge:
    kind: append
- id: dash-6-endpoint-exfil-tooling-rclone-execution
  title: Rclone Execution
  notes: Imported from dashboard 'S1 Threat Hunting and Block Candidate Dashboard - software, domains, AI, VPN, remote access, file sharing, and anti-forensics review.' tab '6. Endpoint Exfil Tooling'.
  pq: event.type in ('Process Creation','Process Start','Process') | let Proc=(src.process.name || tgt.process.name || process.name || '') | let Cmd=(src.process.cmdline || tgt.process.cmdline || process.cmdline || '') | filter Proc contains:anycase('rclone') OR Cmd contains:anycase(' rclone ') | columns ts.timestamp=(event.time || timestamp), endpoint.name, agent.uuid, User=(src.process.user || user.name), Proc, Cmd, Parent=(src.process.parent.name || ''), Path=(src.process.image.path || tgt.process.image.path || '') | sort -ts.timestamp | limit 2000
