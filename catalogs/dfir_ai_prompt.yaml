  notes: 'Source: all | Imported/generated for SOC investigation library.'
  pq: serverHost in ('ghe_server_prod','github_s3') | filter actor contains:anycase('{{entity}}') OR actor.email contains:anycase('{{entity}}') | filter action contains:anycase('download') OR action contains:anycase('clone') OR action contains:anycase('fetch') OR action='repo.download_zip' | sort -timestamp | nolimit | columns Time=simpledateformat(timestamp,'yyyy-MM-dd HH:mm:ss'), Source=serverHost, Actor=actor, Action=action, Repo=repo, IP=actor_ip, UserAgent=user_agent, TokenType=programmatic_access_type
