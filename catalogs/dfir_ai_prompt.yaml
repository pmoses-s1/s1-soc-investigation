- id: psc-02-2
  title: Prompt Security — Data Laundering / Violations
  notes: 'Source: prompt-security | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_prompt_security|prompt-security}}' log.user='{{entity}}' | let ts=(log.timestamp || log.event_time || event_time || timestamp || sca:ingestTime) | let Violations=string(log.violations) | let Secrets=string(log.violationFindingsDetails.Secrets) | filter log.eventType == 'text_action' | filter log.latency >= 1000 OR (!isempty(Violations) && Violations != '[]') OR (!isempty(Secrets) && Secrets != '[]') | sort -ts | nolimit | columns Time=simpledateformat(ts,'yyyy-MM-dd HH:mm:ss'), User=log.user, App=log.application.name, Domain=log.sensor.pageDomain, Policy=log.policyName, Secrets, Violations, Latency=log.latency, ConvID=log.conversationId, PromptID=log.promptResponseId
  merge:
    kind: append
