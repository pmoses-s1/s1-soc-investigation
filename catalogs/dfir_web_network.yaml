name: 'DFIR: Web & network'
queries:
- id: zia-01
  title: ZIA App Summary — Top Destinations
  notes: 'What apps and sites did the user access most? Count by app name. Identifies cloud storage, AI tools, personal email, unusual destinations. | Source: zia | Pivot if positive: Dropbox/iCloud present → ZIA-03 for URL-level detail. ETRADE high volume → note for compliance review'
  pq: |-
    serverHost='{{src_zia|zia}}' event.user='{{entity}}'
    | group Events=count(), UploadBytes=sum(event.outbytes), DownloadBytes=sum(event.inbytes) by App=event.appname
    | sort -Events
    | limit 100
- id: zia-02
  title: ZIA Upload Volume by Destination
  notes: 'Which destinations received the most data from this user? Sorted by bytes out. Identifies large exfil sessions. | Source: zia | Pivot if positive: Unresolved hostname → ZIA-03 for full URLs. Correlate timestamp with GWS downloads in same window'
  pq: |-
    serverHost='{{src_zia|zia}}' event.user='{{entity}}'
    | let BytesOut=(event.outbytes || 0)
    | filter BytesOut > 0
    | group TotalUploadMB=sum(BytesOut)/1048576, Sessions=count(), LastSeen.timestamp=max(timestamp || event.time || sca:ingestTime) by Domain=event.hostname
    | sort -TotalUploadMB
    | limit 50
- id: zia-03
  title: ZIA Cloud Storage / Upload Keyword URL Detail
  notes: 'Did the user access Dropbox, Box, iCloud, Mega, WeTransfer, or other personal cloud storage? URL-level evidence. | Source: zia | Pivot if positive: POST/PUT method + high UploadBytes + sensitive filename in URL = confirmed upload'
  pq: |-
    serverHost='{{src_zia|zia}}' event.user='{{entity}}'
    | filter event.url contains:anycase ('dropbox.com') OR event.url contains:anycase ('box.com') OR event.url contains:anycase ('icloud.com') OR event.url contains:anycase ('mega.nz') OR event.url contains:anycase ('wetransfer.com') OR event.url contains:anycase ('sharefile.com') OR event.url contains:anycase ('onedrive.live.com') OR event.appname in:anycase ('Dropbox','Box','MEGA','WeTransfer','iCloud')
    | let ts=(timestamp || event.time || sca:ingestTime)
    | sort -ts
    | limit 2000
    | columns Time=simpledateformat(ts,'yyyy-MM-dd HH:mm:ss'), Action=event.action, App=event.appname, URL=event.url, Method=event.requestmethod, UploadBytes=event.outbytes, IP=event.ClientIP
- id: zia-04
  title: ZIA Yahoo Mail / Personal Email URL Detail
  notes: 'What actions did the user take in Yahoo Mail? Look for send/compose/attachment URLs. | Source: zia | Pivot if positive: POST to mail.yahoo.com/ws/v3/batch with high UploadBytes = potential email send with attachment'
  pq: |-
    serverHost='{{src_zia|zia}}' event.user='{{entity}}'
    | filter event.hostname contains:anycase ('mail.yahoo.com') OR event.hostname contains:anycase ('data.mail.yahoo.com') OR event.hostname contains:anycase ('gam.mail.yahoosandbox.net')
    | let ts=(timestamp || event.time || sca:ingestTime)
    | sort -ts
    | limit 2000
    | columns Time=simpledateformat(ts,'yyyy-MM-dd HH:mm:ss'), URL=event.url, Method=event.requestmethod, UploadBytes=event.outbytes, InBytes=event.inbytes, Category=event.urlcategory
- id: zia-05
  title: ZIA AI Tool Activity
  notes: 'Did the user access Claude, ChatGPT, Copilot, Gemini, or other AI tools from the corporate device? | Source: zia | Pivot if positive: High upload bytes to AI tools → Prompt Security tab for content inspection'
  pq: |-
    serverHost='{{src_zia|zia}}' event.user='{{entity}}'
    | filter event.appname in:anycase ('Claude','ChatGPT','Microsoft Copilot','Google Gemini','Perplexity','Anthropic') OR event.hostname contains:anycase ('claude.ai') OR event.hostname contains:anycase ('chat.openai.com') OR event.hostname contains:anycase ('copilot.microsoft.com') OR event.hostname contains:anycase ('useast.prompt.security')
    | let ts=(timestamp || event.time || sca:ingestTime)
    | sort -ts
    | limit 2000
    | columns Time=simpledateformat(ts,'yyyy-MM-dd HH:mm:ss'), App=event.appname, Host=event.hostname, UploadBytes=event.outbytes, Category=event.urlcategory, IP=event.ClientIP
- id: net-01
  title: IP Pivot Across Network Sources
  notes: 'Where else did a suspicious IP appear? | Source: network/security sources | Pivot if positive: User/host-specific query by source'
  pq: |-
    serverHost in ('dns-query-logs','panw','pfsense','olympus-vpc-flowlogs','zia','zscaler','aws-network-firewall')
    | filter ipAddress == '{{ip}}' OR ip == '{{ip}}' OR event.src_ip == '{{ip}}' OR event.dest_ip == '{{ip}}' OR sourceIPAddress == '{{ip}}' OR clientpublicIP == '{{ip}}' OR SourceAddress == '{{ip}}' OR DestinationAddress == '{{ip}}'
    | group EventCount=count(), FirstSeen.timestamp=min(timestamp), LastSeen.timestamp=max(timestamp), Hosts=array_agg_distinct(serverHost, 20), Questions=array_agg_distinct(question, 20) by Source=serverHost
    | sort -EventCount
    | limit 100
- id: net-02
  title: DNS Queries by Host/IP
  notes: 'DNS lookups from a host/IP around investigation window. | Source: dns-query-logs | Pivot if positive: VPC Flow / Endpoint process / ZIA web'
  pq: |-
    serverHost='{{src_dns_query_logs|dns-query-logs}}'
    | filter srcaddr == '{{ip}}' OR event.src_ip == '{{ip}}' OR k8s_node == '{{hostname}}' OR question contains:anycase('{{hostname}}')
    | group Count=count(), FirstSeen.timestamp=min(timestamp), LastSeen.timestamp=max(timestamp) by Question=question, SourceIP=srcaddr
    | sort -Count
    | limit 500
- id: net-03
  title: Large Egress / Uploads
  notes: 'Large uploads or egress from user/IP/host. | Source: zia/zscaler/panw/vpc-flow/aws-network-firewall | Pivot if positive: Storage/source app and endpoint file timeline'
  pq: |-
    serverHost in ('zia','zscaler','panw','olympus-vpc-flowlogs','aws-network-firewall')
    | filter login contains:anycase('{{entity}}') OR elogin contains:anycase('{{entity}}') OR event.user contains:anycase('{{entity}}') OR event.src_ip == '{{ip}}' OR SourceUser contains:anycase('{{username}}')
    | group BytesOut=sum(event.netflow.bytes || requestsize || BytesSent || bytes), EventCount=count(), Dests=array_agg_distinct(event.dest_ip || url || dstaddr, 20) by Source=serverHost
    | sort -BytesOut
    | limit 100
- id: zia-ex-01
  title: ZIA Events by Source Type
  notes: 'Baseline ZIA volumes by sourcetype. | Source: zia | Pivot if positive: ZIA raw activity'
  pq: serverHost='{{src_zia|zia}}' | group count=count() by timestamp=timebucket('1h'), sourcetype | transpose sourcetype
- id: zia-ex-02
  title: Allowed vs Blocked Web Activity
  notes: 'Control outcome trend over time. | Source: zia | Pivot if positive: Blocked vs Allowed / Control Gaps'
  pq: serverHost='{{src_zia|zia}}' sourcetype='zscalernss-web' | group count=count() by timestamp=timebucket('1h'), event.action | transpose event.action
- id: zia-up-01
  title: Large Uploads >50MB
  notes: 'Find single-event large uploads. | Source: zia | Pivot if positive: Endpoint staging, destination risk'
  pq: serverHost='{{src_zia|zia}}' | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | filter outB > 50000000 | columns timestamp,event.user,event.devicehostname,event.hostname,event.url,event.appname,event.action,outB | sort -outB
- id: zia-up-02
  title: Upload Destinations by User
  notes: 'Summarize upload volume by user/destination. | Source: zia | Pivot if positive: User risk rollup; raw ZIA'
  pq: serverHost='{{src_zia|zia}}' | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | filter outB > 10000000 | group upload_bytes=sum(outB), events=count() by event.user,event.hostname,event.appname | sort -upload_bytes
- id: zia-up-03
  title: After-Hours Upload Activity
  notes: 'Find uploads outside expected hours. | Source: zia | Pivot if positive: Workday/HR context, endpoint staging'
  pq: serverHost='{{src_zia|zia}}' | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | let hr=hourofday(timestamp) | filter outB > 5000000 AND (hr < 6 OR hr > 20) | group upload_bytes=sum(outB), events=count() by event.user,event.hostname,event.appname | sort -upload_bytes
- id: zia-ai-01
  title: AI Application Usage by User
  notes: 'Find ZIA uploads/events to common AI tools. | Source: zia | Pivot if positive: Prompt Security, OpLockdown AI apps'
  pq: serverHost='{{src_zia|zia}}' | filter event.appname contains:anycase('Claude','Anthropic','Codeium','Windsurf','Glean','OpenAI','ChatGPT','Gemini','Copilot','Perplexity') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | group upload_bytes=sum(outB), events=count() by event.user,event.appname | sort -upload_bytes
- id: zia-ai-02
  title: AI Domains by Upload Volume
  notes: 'Rank AI domains by upload bytes. | Source: zia | Pivot if positive: Prompt Security violations'
  pq: serverHost='{{src_zia|zia}}' | filter event.hostname contains:anycase('claude.ai','anthropic.com','codeium.com','windsurf.ai','glean.com','openai.com','chatgpt.com','gemini.google.com','perplexity.ai') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | group upload_bytes=sum(outB), users=estimate_distinct(event.user), events=count() by event.hostname,event.appname | sort -upload_bytes
- id: zia-sh-01
  title: High-Risk Shadow IT Uploads
  notes: 'Find uploads to personal cloud, transfer, chat, and public sharing sites. | Source: zia | Pivot if positive: Endpoint staging, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter event.hostname contains:anycase('icloud','wetransfer','swisstransfer','mega','dropbox','box','telegram','discord','signal','whatsapp','archive.org','mediafire') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | group upload_bytes=sum(outB), events=count() by event.user,event.hostname,event.appname,event.action | sort -upload_bytes
- id: zia-sh-02
  title: Personal Webmail Uploads
  notes: 'Find potentially uploaded attachments to personal mail. | Source: zia | Pivot if positive: Endpoint staging; DLP'
  pq: serverHost='{{src_zia|zia}}' | filter event.hostname contains:anycase('gmail','outlook.live','hotmail','yahoo','protonmail') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | filter outB > 1000000 | columns timestamp,event.user,event.hostname,event.url,event.appname,event.action,outB | sort -outB
- id: zia-ic-01
  title: Potential iCloud Uploads
  notes: 'Hunt for iCloud upload-like traffic. | Source: zia | Pivot if positive: Endpoint file staging; user timeline'
  pq: serverHost='{{src_zia|zia}}' | filter event.appname='iCloud' OR event.hostname contains:anycase('icloud') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | filter event.requestmethod in ('POST','PUT') OR outB > 5000000 | columns timestamp,event.user,event.devicehostname,event.hostname,event.url,event.requestmethod,event.action,outB | sort -outB
- id: zia-bp-01
  title: Users with ZIA Disable Events
  notes: 'Identify users with disable events and reasons. | Source: zia_disable_reason | Pivot if positive: ZIA disable timeline; endpoint/EDR'
  pq: serverHost='{{src_zia_disable_reason|zia_disable_reason}}' | group events=count(), reasons=array_agg(DisableReason,20) by User | sort -events
- id: zia-bp-02
  title: Disable Events + Blocked Activity Timeline
  notes: 'Correlate ZIA disables with blocked web events. | Source: zia + zia_disable_reason | Pivot if positive: User/device review'
  pq: '| union (serverHost=''zia'' event.action contains:anycase(''block'') | columns timestamp,Type=''Blocked Web Event''), (serverHost=''zia_disable_reason'' | columns timestamp,Type=''ZIA Disabled'') | group count=count() by timestamp=timebucket(''1h''),Type | transpose Type'
- id: zia-it-01
  title: Recommended Block Candidates
  notes: 'Rank destinations that may need policy tuning. | Source: zia | Pivot if positive: Policy owner / business justification'
  pq: serverHost='{{src_zia|zia}}' | filter event.hostname contains:anycase('swisstransfer','wetransfer','archive.org','mega','signal','telegram','icloud','mediafire') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | group upload_bytes=sum(outB), users=estimate_distinct(event.user), events=count() by event.hostname,event.appname,event.action | sort -upload_bytes
- id: zia-bp-02-2
  title: Disable Events + Blocked Activity Timeline
  notes: 'Correlate ZIA disables with blocked web events. | Source: zia + zia_disable_reason | Pivot if positive: User/device review'
  pq: '| union (serverHost=''{{src_zia|zia}}'' event.action contains:anycase(''block'') | columns timestamp,Type=''Blocked Web Event''), (serverHost=''{{src_zia_disable_reason|zia_disable_reason}}'' | columns timestamp,Type=''ZIA Disabled'') | group count=count() by timestamp=timebucket(''1h''),Type | transpose Type'
  merge:
    kind: append
- id: net-03-2
  title: Large Egress / Uploads
  notes: 'Source: all | Imported/generated for SOC investigation library.'
  pq: serverHost in ('zia','zscaler','panw','olympus-vpc-flowlogs','aws-network-firewall') | filter login contains:anycase('{{entity}}') OR elogin contains:anycase('{{entity}}') OR event.user contains:anycase('{{entity}}') OR event.src_ip == '{{ip}}' OR SourceUser contains:anycase('{{entity}}') | group BytesOut=sum(event.netflow.bytes || requestsize || BytesSent || bytes), EventCount=count(), Dests=array_agg_distinct(event.dest_ip || url || dstaddr, 20) by Source=serverHost | sort -BytesOut | nolimit
  merge:
    kind: aggregate
    key_cols:
    - Source
    sum_cols:
    - BytesOut
    - EventCount
    array_cols:
    - Dests
- id: imported-searches-zia-egress-search-22
  title: ZIA / Egress search 22
  notes: 'Source: zia | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_zia|zia}}' event.user contains:anycase '{{entity}}' event.url contains:anycase 'box.com' | columns timestamp, event.user, event.url, event.action, event.requestmethod, event.outbytes, event.inbytes, event.ClientIP, event.useragent | sort -timestamp | nolimit0
  merge:
    kind: append
- id: imported-searches-zia-egress-search-24
  title: ZIA / Egress search 24
  notes: 'Source: zia | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_zia|zia}}' event.user contains:anycase '{{entity}}' event.url contains:anycase 'box.com' | filter timestamp >= '2026-06-20T22:00:00Z' && timestamp <= '2026-06-21T01:00:00Z' | columns timestamp, event.user, event.url, event.action, event.requestmethod, event.outbytes, event.inbytes, event.ClientIP, event.useragent | sort -timestamp | nolimit0
  merge:
    kind: append
- id: imported-searches-zia-egress-search-54
  title: ZIA / Egress search 54
  notes: 'Source: zia | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_zia|zia}}' event.user contains:anycase '{{entity}}' | let ts=(timestamp || event.time || sca:ingestTime) | filter ts = * | group EventCount=count(), BytesUp=sum(event.requestsize), BytesDown=sum(event.responsesize), TopCategories=array_agg_distinct(event.urlcategory, 15), TopApps=array_agg_distinct(event.appname, 15), BlockedCount=count(event.action='Blocked') by Day=timebucket(ts,'1d') | sort -Day | nolimit0
  merge:
    kind: aggregate
    key_cols:
    - Day
    - '''1d'')'
    sum_cols:
    - EventCount
    - BytesUp
    - BytesDown
    - BlockedCount
    array_cols:
    - TopCategories
    - TopApps
- id: zia-01-2
  title: ZIA App Summary — Top Destinations
  notes: 'Source: zia | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_zia|zia}}' event.user='{{entity}}' | group Events=count(), UploadBytes=sum(event.outbytes), DownloadBytes=sum(event.inbytes) by App=event.appname | sort -Events | nolimit
  merge:
    kind: aggregate
    key_cols:
    - App
    sum_cols:
    - Events
    - UploadBytes
    - DownloadBytes
- id: zia-04-2
  title: ZIA Yahoo Mail / Personal Email URL Detail
  notes: 'Source: zia | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_zia|zia}}' event.user='{{entity}}' | filter event.hostname contains:anycase ('mail.yahoo.com') OR event.hostname contains:anycase ('data.mail.yahoo.com') OR event.hostname contains:anycase ('gam.mail.yahoosandbox.net') | let ts=(timestamp || event.time || sca:ingestTime) | sort -ts | nolimit | columns Time=simpledateformat(ts,'yyyy-MM-dd HH:mm:ss'), URL=event.url, Method=event.requestmethod, UploadBytes=event.outbytes, InBytes=event.inbytes, Category=event.urlcategory
  merge:
    kind: append
- id: dash-2-potential-block-candidates-potential-block-candidates-by-app-de
  title: Potential Block Candidates by App / Destination
  notes: Imported from dashboard 'S1 Threat Hunting and Block Candidate Dashboard - software, domains, AI, VPN, remote access, file sharing, and anti-forensics review.' tab '2. Potential Block Candidates'.
  pq: serverHost='{{src_zia|zia}}' | let host=(event.hostname || event.url || event.dns_req || '') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | filter host contains:anycase('swisstransfer','wetransfer','archive.org','mega','signal','telegram','icloud','mediafire','gofile','file.io','pastebin','gist.github','rentry') OR event.appname contains:anycase('uTorrent','BitTorrent','Transmission','AnyDesk','RustDesk','TeamViewer','LogMeIn','Tailscale','NordVPN','ProtonVPN') | group upload_bytes=sum(outB), users=estimate_distinct(event.user), events=count() by host, event.appname, event.action, event.urlcategory | sort -upload_bytes | limit 1000
  merge:
    kind: aggregate
    key_cols:
    - host
    - event.appname
    - event.action
    - event.urlcategory
    sum_cols:
    - upload_bytes
    - events
- id: dash-2-potential-block-candidates-users-requiring-business-justificati
  title: Users Requiring Business Justification Review
  notes: Imported from dashboard 'S1 Threat Hunting and Block Candidate Dashboard - software, domains, AI, VPN, remote access, file sharing, and anti-forensics review.' tab '2. Potential Block Candidates'.
  pq: serverHost='{{src_zia|zia}}' | let host=(event.hostname || event.url || event.dns_req || '') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | filter host contains:anycase('icloud','wetransfer','swisstransfer','mega','telegram','signal','discord','archive.org','codeium','claude','anthropic','glean','perplexity','openai','chatgpt') | group upload_bytes=sum(outB), apps=estimate_distinct(event.appname), destinations=estimate_distinct(host), events=count() by event.user, event.devicehostname | filter upload_bytes > 50000000 OR destinations > 5 | sort -upload_bytes | limit 1000
  merge:
    kind: aggregate
    key_cols:
    - event.user
    - event.devicehostname
    sum_cols:
    - upload_bytes
    - events
- id: dash-4-remote-access-vpn-p2p-vpn-proxy-anonymizer-zia-activity
  title: VPN / Proxy / Anonymizer ZIA Activity
  notes: Imported from dashboard 'S1 Threat Hunting and Block Candidate Dashboard - software, domains, AI, VPN, remote access, file sharing, and anti-forensics review.' tab '4. Remote Access / VPN / P2P'.
  pq: serverHost='{{src_zia|zia}}' | let ts=(event.datetime || timestamp || sca:ingestTime) | let host=(event.hostname || event.url || event.dns_req || '') | filter host contains:anycase('torproject.org','protonvpn','nordvpn','expressvpn','surfshark','tunnelbear','hide.me','openvpn','tailscale','wireguard') OR event.urlcategory contains:anycase('anonymizer','proxy avoidance') | columns ts.timestamp=ts, event.user, event.devicehostname, host, event.url, event.action, event.rulelabel, event.destcountry | sort -ts.timestamp | limit 5000
  merge:
    kind: append
- id: dash-5-shadow-it-webmail-file-sharing-paste-public-text-dump-sites
  title: Paste / Public Text Dump Sites
  notes: Imported from dashboard 'S1 Threat Hunting and Block Candidate Dashboard - software, domains, AI, VPN, remote access, file sharing, and anti-forensics review.' tab '5. Shadow IT / Webmail / File Sharing'.
  pq: serverHost='{{src_zia|zia}}' | let ts=(event.datetime || timestamp || sca:ingestTime) | let host=(event.hostname || event.url || event.dns_req || '') | filter host contains:anycase('pastebin.com','gist.github.com','ghostbin.com','paste.ee','rentry.co','dpaste.com','hastebin.com') | columns ts.timestamp=ts, event.user, event.deviceowner, event.devicehostname, host, event.url, event.appname, event.outbytes, event.action, event.rulelabel | sort -ts.timestamp | limit 5000
  merge:
    kind: append
- id: dash-2-zia-upload-shadow-it-large-uploads-50mb
  title: Large Uploads >50MB
  notes: Imported from dashboard 'S1 DLP and Exfiltration Dashboard - ZIA egress, SaaS exports, Prompt Security, iCloud, USB, staging, and correlation timelines.' tab '2. ZIA Upload & Shadow IT'.
  pq: serverHost='{{src_zia|zia}}' | let ts=(event.datetime || timestamp || sca:ingestTime) | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | filter outB > 50000000 | columns ts.timestamp=ts, event.user, event.devicehostname, event.deviceowner, event.hostname, event.url, event.appname, event.requestmethod, event.action, outB | sort -outB | limit 5000
  merge:
    kind: append
- id: dash-2-zia-upload-shadow-it-high-risk-shadow-it-uploads
  title: High-Risk Shadow IT Uploads
  notes: Imported from dashboard 'S1 DLP and Exfiltration Dashboard - ZIA egress, SaaS exports, Prompt Security, iCloud, USB, staging, and correlation timelines.' tab '2. ZIA Upload & Shadow IT'.
  pq: serverHost='{{src_zia|zia}}' | let host=(event.hostname || event.url || event.dns_req || '') | filter host contains:anycase('icloud','wetransfer','swisstransfer','mega','dropbox','box','telegram','discord','signal','whatsapp','archive.org','mediafire','gofile','file.io') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | group upload_bytes=sum(outB), events=count() by event.user, event.devicehostname, host, event.appname, event.action | sort -upload_bytes | limit 1000
  merge:
    kind: aggregate
    key_cols:
    - event.user
    - event.devicehostname
    - host
    - event.appname
    - event.action
    sum_cols:
    - upload_bytes
    - events
- id: dash-2-zia-upload-shadow-it-zia-disable-bypass-events
  title: ZIA Disable / Bypass Events
  notes: Imported from dashboard 'S1 DLP and Exfiltration Dashboard - ZIA egress, SaaS exports, Prompt Security, iCloud, USB, staging, and correlation timelines.' tab '2. ZIA Upload & Shadow IT'.
  pq: serverHost='{{src_zia_disable_reason|zia_disable_reason}}' | group events=count(), reasons=array_agg(DisableReason,20), users=array_agg(User,10) by UDID | sort -events | limit 500
  merge:
    kind: aggregate
    key_cols:
    - UDID
    sum_cols:
    - events
- id: dash-8-correlation-timelines-installed-high-risk-software-same-user-zi
  title: Installed High-Risk Software + Same User ZIA Egress Timeline
  notes: Imported from dashboard 'S1 DLP and Exfiltration Dashboard - ZIA egress, SaaS exports, Prompt Security, iCloud, USB, staging, and correlation timelines.' tab '8. Correlation Timelines'.
  pq: '| union ( serverHost=''{{src_oplockdown|oplockdown}}'' | filter tag in (''VPN'',''RemoteManagement'',''Filesharing'',''Peer-To-Peer'',''AI-IDE'',''AI-MISUSE'') | columns ts.timestamp=timestamp, User=owner, endpoint.name, signal=''oplockdown_installed'', object=app_name, detail=tag, bytes=0 ), ( serverHost=''{{src_zia|zia}}'' | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | filter outB > 5000000 OR event.hostname contains:anycase(''icloud'',''dropbox'',''wetransfer'',''mega'',''github'',''gitlab'',''anthropic'',''openai'',''chatgpt'',''perplexity'') | columns ts.timestamp=(event.datetime || timestamp), User=event.user, endpoint.name=event.devicehostname, signal=''zia_egress'', object=(event.hostname || event.url), detail=(event.appname || event.action), bytes=outB ) | sort User, -ts.timestamp | limit 10000'
  merge:
    kind: append
- id: dash-1-executive-summary-large-zia-uploads-50mb
  title: Large ZIA Uploads >50MB
  notes: Imported from dashboard 'Unified Insider Risk / DLP investigation dashboard combining OpLockdown software inventory, SentinelOne EDR behavior, ZIA egress, iCloud sync, Prompt Security AI activity, Google Workspace, Salesforce, and quick correlation views. Use dashboard-level filters where available; for sources with different identity fields, use the normalized User columns in tables for ad hoc filtering/drilldown.' tab '1. Executive Summary'.
  pq: serverHost='{{src_zia|zia}}' | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | filter outB > 50000000 | group count()
  merge:
    kind: aggregate
    key_cols:
    - Source
- id: dash-4-zia-egress-dlp-large-uploads-50mb
