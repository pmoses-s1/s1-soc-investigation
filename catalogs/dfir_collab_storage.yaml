name: 'DFIR: Collaboration & storage'
queries:
- id: gws-01
  title: GWS All Drive Activity — Overview
  notes: 'What Google Drive event types did this user generate? Baseline before drilling down. | Source: google_workspace | Pivot if positive: download, copy, print, trash spikes → drill into specific queries below'
  pq: 'serverHost=''{{src_google_workspace|google_workspace}}'' actor.email=''{{entity}}'' id.applicationName=''drive''

    | group Events=count() by EventName=event.name, Day.timestamp=timebucket(timestamp,''1d'')

    | sort -Day.timestamp

    | transpose EventName on Day.timestamp'
  scope: subject
- id: gws-02
  title: GWS Downloads
  notes: 'What files did the user explicitly download from Google Drive?


    NOTE: event.originating_app_id != ''124622177520'' excludes automated Glean/SCIO indexing. This is required — without this exclusion, results include thousands of automated ''downloads'' that are not user actions. | Source: google_workspace | Pivot if positive: Sensitive files → GWS-05 for classification. Endpoint Downloads folder EDR-07 for same filenames'
  pq: 'serverHost=''{{src_google_workspace|google_workspace}}'' actor.email=''{{entity}}'' event.name=''download'' id.applicationName=''drive''

    | filter event.originating_app_id != ''124622177520''

    | let ts=(timestamp || event.time || sca:ingestTime)

    | sort -ts

    | limit 5000

    | columns Time=simpledateformat(ts,''yyyy-MM-dd HH:mm:ss''), DocTitle=event.doc_title, DocID=event.doc_id, DocType=event.doc_type, Classification=classificationLabel, IP=ipAddress, App=event.app_name'
  scope: subject
- id: gws-03
  title: GWS External Sharing
  notes: 'Were any files shared externally (public link, anyone with link, shared_externally)? | Source: google_workspace | Pivot if positive: Externally shared + Confidential/HC classification = escalate. Was file also downloaded?'
  pq: 'serverHost=''{{src_google_workspace|google_workspace}}'' actor.email=''{{entity}}'' id.applicationName=''drive''

    | filter event.visibility in:anycase (''public_on_the_web'',''people_with_link'',''shared_externally'') OR event.old_visibility in:anycase (''public_on_the_web'',''people_with_link'',''shared_externally'')

    | let ts=(timestamp || event.time || sca:ingestTime)

    | sort -ts

    | limit 2000

    | columns Time=simpledateformat(ts,''yyyy-MM-dd HH:mm:ss''), DocTitle=event.doc_title, DocID=event.doc_id, NewVisibility=event.visibility, OldVisibility=event.old_visibility, Classification=classificationLabel, Owner=event.owner, IP=ipAddress'
  scope: subject
- id: gws-04
  title: GWS Deleted / Trashed Files
  notes: 'Did the user delete or trash files — especially after downloading them? Anti-forensics signal. | Source: google_workspace | Pivot if positive: Compare deletion timestamps to GWS-02 download timestamps for same doc IDs'
  pq: 'serverHost=''{{src_google_workspace|google_workspace}}'' actor.email=''{{entity}}'' id.applicationName=''drive''

    | filter event.name in:anycase (''trash'',''delete'')

    | filter !(event.deletion_reason == ''trash_auto_delete'')

    | let ts=(timestamp || event.time || sca:ingestTime)

    | sort -ts

    | limit 2000

    | columns Time=simpledateformat(ts,''yyyy-MM-dd HH:mm:ss''), DocTitle=event.doc_title, DocID=event.doc_id, Classification=classificationLabel, Reason=event.deletion_reason, IP=ipAddress'
  scope: subject
- id: gws-05
  title: GWS Sensitive File Access — Confidential + HC
  notes: 'Which Confidential or Highly Confidential files did this user access, sync, or download? | Source: google_workspace | Pivot if positive: Repeated sync of same HC doc → EDR temp file artifacts for confirmation'
  pq: 'serverHost=''{{src_google_workspace|google_workspace}}'' actor.email=''{{entity}}'' id.applicationName=''drive''

    | filter classificationLabel in:anycase (''Highly Confidential'',''Confidential'')

    | filter event.name in:anycase (''sync_item_content'',''download'',''access_item_content'',''view'',''copy'',''print'')

    | let ts=(timestamp || event.time || sca:ingestTime)

    | sort -ts

    | limit 5000

    | columns Time=simpledateformat(ts,''yyyy-MM-dd HH:mm:ss''), Event=event.name, DocTitle=event.doc_title, DocID=event.doc_id, Classification=classificationLabel, Owner=event.owner, IP=ipAddress, App=event.app_name'
  scope: subject
- id: gws-06
  title: GWS Activity Daily Summary
  notes: 'How many events and unique documents per day? Identify spike days for deeper review. | Source: monitor | Pivot if positive: Peak days → run GWS-02 and GWS-05 scoped to those dates'
  pq: 'serverHost=''{{src_monitor|monitor}}'' pqEvent=''google_workspace_user_summary''

    | filter actor.email == ''{{entity}}''

    | let ts=(timestamp || event.time || sca:ingestTime)

    | sort -ts

    | limit 1000

    | columns Time=simpledateformat(ts,''yyyy-MM-dd HH:mm:ss''), Email=actor.email, TotalDownloads, UniqueFileCount, GB'
  scope: subject
- id: slk-01
  title: Slack File Downloads — All Devices
  notes: 'What files did the user download from Slack? Includes device type parsed from user agent.


    NOTE: Glean/SCIO crawler is excluded — it would generate thousands of false file_downloaded events. Always include these exclusions. | Source: slack | Pivot if positive: iPhone/Android downloads → outside ZIA inspection. Filenames → correlate with GWS downloads'
  pq: 'serverHost=''{{src_slack|slack}}'' actor.user.email=''{{entity}}'' action=''file_downloaded''

    | filter !(context.app.name contains:anycase ''Glean'')

    | filter !(context.ua contains:anycase ''GleanSearchCrawlerBot'')

    | filter !(context.ua contains:anycase ''Scio Search'')

    | let ts=(timestamp || event.time || sca:ingestTime)

    | let DeviceType=context.ua contains:anycase ''iphone'' ? ''iPhone (personal)'' : context.ua contains:anycase ''android'' ? ''Android (personal)'' : context.ua contains:anycase ''AppleSilicon Sonic Slack'' ? ''macOS Desktop App'' : context.ua contains:anycase ''Sonic Slack'' ? ''Windows Desktop App'' : context.ua contains:anycase("Windows NT") ? ''Windows Browser'' : context.ua contains:anycase("Macintosh") ? ''macOS Browser'' : context.ua

    | sort -ts

    | limit 2000

    | columns Time=simpledateformat(ts,''yyyy-MM-dd HH:mm:ss''), File=entity.file.name, FileID=entity.file.id, FileType=entity.file.filetype, Device=DeviceType, IP=context.ip_address, Location=context.location.name, URL=details.url_private'
  scope: subject
- id: slk-02
  title: Slack Non-Corporate Device Downloads
  notes: 'Files downloaded to personal devices only (excludes corporate Windows device). Replace Windows NT version with subject''s actual OS build if known. | Source: slack | Pivot if positive: iPhone downloads from off-network IP = highest priority for AXIOM. File IDs for forensic retrieval'
  pq: 'serverHost=''{{src_slack|slack}}'' actor.user.email=''{{entity}}'' action in (''file_downloaded'',''file_shared'',''file_uploaded'',''file_deleted'')

    | filter !(context.ua contains:anycase ''Windows NT 10.0.26100'')

    | filter !(context.ua contains:anycase ''OKTA'')

    | filter !(context.ua contains:anycase ''GleanSearchCrawlerBot'')

    | filter !(context.ua contains:anycase ''Scio Search'')

    | let ts=(timestamp || event.time || sca:ingestTime)

    | sort -ts

    | limit 2000

    | columns Time=simpledateformat(ts,''yyyy-MM-dd HH:mm:ss''), Action=action, File=entity.file.name, FileID=entity.file.id, IP=context.ip_address, UA=context.ua, URL=details.url_private'
  scope: subject
- id: slk-03
  title: Slack File Uploads
  notes: 'What files did the user upload to Slack? Uploading sensitive docs to Slack = potential staging for sharing. | Source: slack | Pivot if positive: Sensitive filename → channel ID → resolve channel name with Slack admin. Multiple uploads = 5+ = deliberate sharing'
  pq: 'serverHost=''{{src_slack|slack}}'' actor.user.email=''{{entity}}'' action=''file_uploaded''

    | filter !(context.ua contains:anycase ''GleanSearchCrawlerBot'')

    | let ts=(timestamp || event.time || sca:ingestTime)

    | sort -ts

    | limit 2000

    | columns Time=simpledateformat(ts,''yyyy-MM-dd HH:mm:ss''), File=entity.file.name, FileID=entity.file.id, FileType=entity.file.filetype, Channel=entity.channel.id, IP=context.ip_address, UA=context.ua'
  scope: subject
- id: slk-04
  title: Slack Channel Joins — Burst Pattern
  notes: 'Did the user join many channels in a short period? Burst joins before departure = accessing file history. | Source: slack | Pivot if positive: Channel joined → file_downloaded from that channel in same day window?'
  pq: 'serverHost=''{{src_slack|slack}}'' actor.user.email=''{{entity}}'' action=''user_joined_channel''

    | let ts=(timestamp || event.time || sca:ingestTime)

    | sort -ts

    | limit 2000

    | columns Time=simpledateformat(ts,''yyyy-MM-dd HH:mm:ss''), Channel=entity.channel.name, ChannelID=entity.channel.id, IP=context.ip_address'
  scope: subject
- id: slk-05
  title: Slack Activity by Device Type
  notes: 'What device types has the user accessed Slack from? Shows corporate vs personal device breakdown. | Source: slack | Pivot if positive: Mobile device present → SLK-02 for mobile-only downloads'
  pq: 'serverHost=''{{src_slack|slack}}'' actor.user.email=''{{entity}}''

    | filter !(context.ua contains:anycase ''GleanSearchCrawlerBot'')

    | filter !(context.ua contains:anycase ''Scio Search'')

    | let DeviceType=context.ua contains:anycase ''iphone'' ? ''iPhone'' : context.ua contains:anycase ''android'' ? ''Android'' : context.ua contains:anycase ''AppleSilicon Sonic Slack'' ? ''macOS Desktop App'' : context.ua contains:anycase ''Sonic Slack'' ? ''Windows Desktop App'' : context.ua contains:anycase("Windows NT") ? ''Windows Browser'' : context.ua contains:anycase("Macintosh") ? ''macOS Browser'' : ''Other/API''

    | group Events=count(), Actions=array_agg_distinct(action, 10) by DeviceType

    | sort -Events'
  scope: subject
- id: atl-01
  title: Atlassian/Jira/Confluence Coverage
  notes: 'What Atlassian/Jira/Confluence activity exists for this user? | Source: atlassian-cloud-enterprise/jira/confluence-cloud | Pivot if positive: ATL-02/ATL-03 and Okta app SSO'
  pq: 'serverHost in (''atlassian-cloud-enterprise'',''jira'',''confluence-cloud'')

    | filter actor.email contains:anycase(''{{entity}}'') OR actor.name contains:anycase(''{{username}}'') OR user contains:anycase(''{{username}}'')

    | group EventCount=count(), FirstSeen.timestamp=min(timestamp), LastSeen.timestamp=max(timestamp), Actions=array_agg_distinct(action, 20) by Source=serverHost

    | sort -EventCount

    | limit 100'
  scope: subject
- id: atl-02
  title: Confluence Space Exports / Jira Bulk
  notes: 'Any export-like actions in Confluence/Jira? | Source: confluence-cloud/jira/atlassian-cloud-enterprise | Pivot if positive: Endpoint archive/staging, ZIA upload, Google Drive/Box follow-on'
  pq: 'serverHost in (''confluence-cloud'',''jira'',''atlassian-cloud-enterprise'')

    | filter actor.email contains:anycase(''{{entity}}'') OR actor.name contains:anycase(''{{username}}'')

    | filter action contains:anycase(''export'') OR action contains:anycase(''download'') OR action contains:anycase(''attachment'') OR event.name contains:anycase(''export'')

    | sort -timestamp

    | limit 2000

    | columns Time=simpledateformat(timestamp,''yyyy-MM-dd HH:mm:ss''), Source=serverHost, Actor=actor.email, Action=action, Object=object, IP=location.ip, Method=method'
  scope: subject
- id: atl-03
  title: Atlassian API Token / Admin Changes
  notes: 'Was access, token, or admin configuration changed? | Source: atlassian-cloud-enterprise | Pivot if positive: Okta admin events, PagerDuty/Snyk admin changes'
  pq: 'serverHost=''{{src_atlassian_cloud_enterprise|atlassian-cloud-enterprise}}''

    | filter actor.email contains:anycase(''{{entity}}'') OR actor.name contains:anycase(''{{username}}'')

    | filter action contains:anycase(''token'') OR action contains:anycase(''admin'') OR action contains:anycase(''group'') OR action contains:anycase(''permission'')

    | sort -timestamp

    | limit 1000

    | columns Time=simpledateformat(timestamp,''yyyy-MM-dd HH:mm:ss''), Actor=actor.email, Action=action, IP=location.ip, Token=actor.tokenLabel, Changes=changedValues, Context=context'
  scope: subject
- id: sto-01
  title: Google Drive Downloads / External Sharing
  notes: 'Drive downloads, visibility changes, or external sharing by user. | Source: google_workspace/google_workspace_prompt_drive | Pivot if positive: ZIA upload/exfil, Endpoint file activity'
  pq: 'serverHost in (''google_workspace'',''google_workspace_prompt_drive'')

    | filter actor.email contains:anycase(''{{entity}}'')

    | filter id.applicationName=''drive'' OR event.name contains:anycase(''download'') OR event.name contains:anycase(''visibility'') OR event.visibility contains:anycase(''external'')

    | sort -timestamp

    | limit 3000

    | columns Time=simpledateformat(timestamp,''yyyy-MM-dd HH:mm:ss''), Actor=actor.email, App=id.applicationName, Event=event.name, Title=event.doc_title, Owner=event.owner, Visibility=event.visibility, IP=ipAddress, Label=classificationLabel'
  scope: subject
- id: sto-02
  title: Box Downloads / Sharing
  notes: 'Box downloads, shared links, collaboration invites. | Source: box | Pivot if positive: Exclude service_name=Box Drive/Sync then corroborate with endpoint/ZIA'
  pq: 'serverHost=''{{src_box|box}}''

    | filter created_by.login contains:anycase(''{{entity}}'') OR actor.email contains:anycase(''{{entity}}'')

    | filter event_type contains:anycase(''download'') OR event_type contains:anycase(''share'') OR event_type contains:anycase(''collaboration'') OR event_type contains:anycase(''link'')

    | sort -timestamp

    | limit 3000

    | columns Time=simpledateformat(timestamp,''yyyy-MM-dd HH:mm:ss''), Actor=created_by.login, Event=event_type, Item=source.name, Size=additional_details.size, IP=ip_address, Service=additional_details.service_name'
  scope: subject
- id: sto-03
  title: OneDrive / SharePoint Activity
  notes: 'Any M365 storage activity for this user? | Source: onedrive | Pivot if positive: Storage and ZIA/Endpoint corroboration'
  pq: 'serverHost=''{{src_onedrive|onedrive}}''

    | filter actor.email contains:anycase(''{{entity}}'') OR user contains:anycase(''{{entity}}'')

    | filter event.name contains:anycase(''download'') OR event.name contains:anycase(''share'') OR event.name contains:anycase(''sync'') OR event.name contains:anycase(''access'')

    | sort -timestamp

    | limit 3000

    | columns Time=simpledateformat(timestamp,''yyyy-MM-dd HH:mm:ss''), Actor=actor.email, Event=event.name, Object=event.doc_title, IP=ipAddress, Label=classificationLabel'
  scope: subject
- id: azr-02-2
  title: Azure OneDrive — Sharing and Downloads
  notes: 'Source: onedrive | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_onedrive|onedrive}}' userPrincipalName='{{entity}}' | filter operation matches:anycase ('SharingSet|SharingInvitationCreated|AnonymousLinkCreated|FileDownloaded|FileSyncDownloaded|FileDeleted') | let ts=(timestamp || createdDateTime || sca:ingestTime) | sort -ts | nolimit | columns Time=simpledateformat(ts,'yyyy-MM-dd HH:mm:ss'), Operation=operation, File=auditData.SourceFileName, Ext=auditData.SourceFileExtension, Site=auditData.SiteUrl, IP=auditData.ClientIP, Managed=auditData.IsManagedDevice, App=auditData.ApplicationDisplayName
  merge:
    kind: append
  scope: subject
- id: gws-06-2
  title: GWS Activity Daily Summary
  notes: 'Source: monitor | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_monitor|monitor}}' pqEvent='google_workspace_user_summary' | filter actor.email == '{{entity}}' | let ts=(timestamp || event.time || sca:ingestTime) | sort -ts | nolimit | columns Time=simpledateformat(ts,'yyyy-MM-dd HH:mm:ss'), Email=actor.email, TotalDownloads, UniqueFileCount, GB
  merge:
    kind: append
  scope: subject
- id: gws-04-2
  title: GWS Deleted / Trashed Files
  notes: 'Source: google_workspace | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_google_workspace|google_workspace}}' actor.email='{{entity}}' id.applicationName='drive' | filter event.name in:anycase ('trash','delete') | filter !(event.deletion_reason == 'trash_auto_delete') | let ts=(timestamp || event.time || sca:ingestTime) | sort -ts | nolimit | columns Time=simpledateformat(ts,'yyyy-MM-dd HH:mm:ss'), DocTitle=event.doc_title, DocID=event.doc_id, Classification=classificationLabel, Reason=event.deletion_reason, IP=ipAddress
  merge:
    kind: append
  scope: subject
- id: gws-02-2
  title: GWS Downloads
  notes: 'Source: google_workspace | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_google_workspace|google_workspace}}' actor.email='{{entity}}' event.name='download' id.applicationName='drive' | filter event.originating_app_id != '124622177520' | let ts=(timestamp || event.time || sca:ingestTime) | sort -ts | nolimit | columns Time=simpledateformat(ts,'yyyy-MM-dd HH:mm:ss'), DocTitle=event.doc_title, DocID=event.doc_id, DocType=event.doc_type, Classification=classificationLabel, IP=ipAddress, App=event.app_name
  merge:
    kind: append
  scope: subject
- id: gws-03-2
  title: GWS External Sharing
  notes: 'Source: google_workspace | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_google_workspace|google_workspace}}' actor.email='{{entity}}' id.applicationName='drive' | filter event.visibility in:anycase ('public_on_the_web','people_with_link','shared_externally') OR event.old_visibility in:anycase ('public_on_the_web','people_with_link','shared_externally') | let ts=(timestamp || event.time || sca:ingestTime) | sort -ts | nolimit | columns Time=simpledateformat(ts,'yyyy-MM-dd HH:mm:ss'), DocTitle=event.doc_title, DocID=event.doc_id, NewVisibility=event.visibility, OldVisibility=event.old_visibility, Classification=classificationLabel, Owner=event.owner, IP=ipAddress
  merge:
    kind: append
  scope: subject
- id: gws-05-2
  title: GWS Sensitive File Access — Confidential + HC
  notes: 'Source: google_workspace | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_google_workspace|google_workspace}}' actor.email='{{entity}}' id.applicationName='drive' | filter classificationLabel in:anycase ('Highly Confidential','Confidential') | filter event.name in:anycase ('sync_item_content','download','access_item_content','view','copy','print') | let ts=(timestamp || event.time || sca:ingestTime) | sort -ts | nolimit | columns Time=simpledateformat(ts,'yyyy-MM-dd HH:mm:ss'), Event=event.name, DocTitle=event.doc_title, DocID=event.doc_id, Classification=classificationLabel, Owner=event.owner, IP=ipAddress, App=event.app_name
  merge:
    kind: append
  scope: subject
- id: sto-01-2
  title: Google Drive Downloads / External Sharing
  notes: 'Source: google_workspace | Imported/generated for SOC investigation library.'
  pq: serverHost in ('google_workspace','google_workspace_prompt_drive') | filter actor.email contains:anycase('{{entity}}') | filter id.applicationName='drive' OR event.name contains:anycase('download') OR event.name contains:anycase('visibility') OR event.visibility contains:anycase('external') | sort -timestamp | nolimit | columns Time=simpledateformat(timestamp,'yyyy-MM-dd HH:mm:ss'), Actor=actor.email, App=id.applicationName, Event=event.name, Title=event.doc_title, Owner=event.owner, Visibility=event.visibility, IP=ipAddress, Label=classificationLabel
  merge:
    kind: append
  scope: subject
- id: imported-searches-google-workspace-search-23
  title: Google Workspace search 23
  notes: 'Source: google_workspace | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_google_workspace|google_workspace}}' actor.email contains:anycase '{{entity}}' event.name in ('User Sharing Permissions Change','Change access scope','Change document visibility') | columns timestamp, actor.email, event.name, event.doc_title, event.old_visibility, event.visibility, ipAddress | sort -timestamp | nolimit
  merge:
    kind: append
  scope: subject
- id: imported-searches-google-workspace-search-32
  title: Google Workspace search 32
  notes: 'Source: google_workspace | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_google_workspace|google_workspace}}' actor.email contains:anycase '{{entity}}' event.name in:anycase ('download','export','print') event.doc_title contains:anycase ('AMER','Federal','Forecast','Pipeline','Regional Maps','QBR','Tracker') | columns timestamp, event.name, event.doc_title, event.doc_type, event.visibility, classificationLabel, ipAddress, actor.applicationInfo.applicationName | sort -timestamp | nolimit
  merge:
    kind: append
  scope: subject
- id: imported-searches-google-workspace-search-33
  title: Google Workspace search 33
  notes: 'Source: google_workspace | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_google_workspace|google_workspace}}' actor.email contains:anycase '{{entity}}' event.name in:anycase ('download','export','print') | columns timestamp, actor.email, event.name, event.doc_title, event.doc_type, classificationLabel, event.visibility, ipAddress, actor.applicationInfo.applicationName | sort -timestamp | nolimit
  merge:
    kind: append
  scope: subject
- id: imported-searches-google-workspace-search-35
  title: Google Workspace search 35
  notes: 'Source: google_workspace | Imported/generated for SOC investigation library.'
  pq: '"serverHost=''{{src_google_workspace|google_workspace}}'' actor.email contains:anycase ''{{entity}}'' event.name in:anycase (''download'',''export'',''print'') event.doc_title contains:anycase (''AMER'',''Federal'',''Forecast'',''Pipeline'',''Regional Maps'',''QBR'',''Tracker'') | columns timestamp, event.name, event.doc_title, event.doc_type, event.visibility, classificationLabel, ipAddress, actor.applicationInfo.applicationName | sort -timestamp | nolimit"|nolimit'
  merge:
    kind: append
  scope: subject
- id: imported-searches-google-workspace-search-36
  title: Google Workspace search 36
  notes: 'Source: google_workspace | Imported/generated for SOC investigation library.'
  pq: '"serverHost=''{{src_google_workspace|google_workspace}}'' actor.email contains:anycase ''{{entity}}'' event.name in (''User Sharing Permissions Change'',''Change access scope'',''Change document visibility'') | columns timestamp, actor.email, event.name, event.doc_title, event.old_visibility, event.visibility, ipAddress | sort -timestamp | nolimit"|nolimit'
  merge:
    kind: append
  scope: subject
- id: imported-searches-google-workspace-search-37
  title: Google Workspace search 37
  notes: 'Source: google_workspace | Imported/generated for SOC investigation library.'
  pq: '"serverHost=''{{src_google_workspace|google_workspace}}'' actor.email contains:anycase ''{{entity}}'' event.name in:anycase (''download'',''export'',''print'') | columns timestamp, actor.email, event.name, event.doc_title, event.doc_type, classificationLabel, event.visibility, ipAddress, actor.applicationInfo.applicationName | sort -timestamp | nolimit"|nolimit'
  merge:
    kind: append
  scope: subject
- id: imported-searches-google-workspace-search-55
  title: Google Workspace search 55
  notes: 'Source: google_workspace | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_google_workspace|google_workspace}}' actor.email contains:anycase '{{entity}}' event.name='change_user_access' event.visibility=* | filter event.visibility != event.old_visibility | filter event.visibility in ('shared_externally','public_in_the_domain','people_with_link') | columns timestamp, actor.email, event.doc_title, event.doc_id, classificationLabel, OldVisibility=event.old_visibility, NewVisibility=event.visibility, ipAddress | sort -timestamp | nolimit
  merge:
    kind: append
  scope: subject
- id: imported-searches-google-workspace-search-56
  title: Google Workspace search 56
  notes: 'Source: google_workspace | Imported/generated for SOC investigation library.'
  pq: 'serverHost=''{{src_google_workspace|google_workspace}}'' actor.email contains:anycase ''{{entity}}'' event.name in (''download'',''access_item_content'',''sync_item_content'',''view'') | let source=(actor.applicationInfo.applicationName ? actor.applicationInfo.applicationName : ''DIRECT_USER'') | group EventCount=count(), DocTitles=array_agg_distinct(event.doc_title, 15), Classifications=array_agg_distinct(classificationLabel, 10) by source, Action=event.name | sort -EventCount | nolimit0'
  merge:
    kind: aggregate
    key_cols:
    - source
    - Action
    sum_cols:
    - EventCount
    array_cols:
    - DocTitles
    - Classifications
  scope: subject
- id: imported-searches-google-workspace-search-57
  title: Google Workspace search 57
  notes: 'Source: google_workspace | Imported/generated for SOC investigation library.'
  pq: serverHost='{{src_google_workspace|google_workspace}}' actor.email contains:anycase '{{entity}}' | let ts=(timestamp || published || sca:ingestTime) | filter ts = * | group EventCount=count(), Actions=array_agg_distinct(event.name, 25), DocTitles=array_agg_distinct(event.doc_title, 10), Classifications=array_agg_distinct(classificationLabel, 10), IPs=array_agg_distinct(ipAddress, 15) by Day=timebucket(ts,'1d') | sort -Day | nolimit
  merge:
    kind: aggregate
    key_cols:
    - Day
    - '''1d'')'
    sum_cols:
    - EventCount
    array_cols:
    - Actions
    - DocTitles
    - Classifications
    - IPs
  scope: subject
- id: imported-searches-google-workspace-search-58
  title: Google Workspace search 58
  notes: 'Source: google_workspace | Imported/generated for SOC investigation library.'
