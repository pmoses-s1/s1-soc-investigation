  pq: '| filter ((agent.uuid == ''{{agent_uuid}}'' OR endpoint.name contains:anycase(''{{hostname}}'') OR src.process.user contains:anycase(''{{username}}''))) | filter( event.type == ''File Creation'' ) | filter( tgt.file.path matches ''(?i).*\\\\Users\\\\.*\\\\(Downloads|Desktop|Documents)\\\\.*'' OR tgt.file.path matches ''(?i).*\\\\AppData\\\\(Local|Roaming)\\\\.*\\\\Temp\\\\.*'' OR tgt.file.path matches ''(?i).*/(Downloads|Desktop|Documents|tmp|Temp)/.*'' ) | filter( tgt.file.extension in:anycase(''go'',''rs'',''py'',''js'',''ts'',''c'',''cpp'',''h'',''java'',''cs'',''kt'',''swift'',''sql'',''env'',''pem'',''key'',''p12'',''pfx'',''kdbx'',''tf'',''yml'',''yaml'',''json'',''csv'',''xlsx'',''xls'',''docx'',''pptx'',''pdf'') ) | columns timestamp=(event.time || timestamp), endpoint.name, agent.uuid, User=(src.process.user || user.name), File=tgt.file.path, Ext=tgt.file.extension, Size=tgt.file.size, Proc=(src.process.name || src.process.image.path), Cmd=src.process.cmdline | sort -timestamp | limit 2000'
  scope: subject
