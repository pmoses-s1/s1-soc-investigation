- id: zia-dlp-40
  title: History Clearing / Terminal Cleanup
  notes: 'Detects likely command history clearing or shell trace cleanup. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: '| filter ((agent.uuid == ''{{agent_uuid}}'' OR endpoint.name contains:anycase(''{{hostname}}'') OR src.process.user contains:anycase(''{{username}}''))) | filter( event.type == ''Process Creation'' ) | let Cmd=(src.process.cmdline || tgt.process.cmdline || '''') | filter( Cmd contains:anycase(''history -c'',''Clear-History'',''rm -rf ~/.bash_history'',''rm -rf ~/.zsh_history'',''del ConsoleHost_history.txt'',''Remove-Item ConsoleHost_history.txt'') ) | columns timestamp=(event.time || timestamp), endpoint.name, agent.uuid, User=(src.process.user || user.name), Proc=(src.process.name || tgt.process.name), Cmd | sort -timestamp | limit 2000'
  scope: subject
- id: zia-dlp-41
  title: Cleanup / Wiping Tools
  notes: 'Detects common utilities used to cover tracks or erase evidence. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: '| filter ((agent.uuid == ''{{agent_uuid}}'' OR endpoint.name contains:anycase(''{{hostname}}'') OR src.process.user contains:anycase(''{{username}}''))) | filter( event.type == ''Process Creation'' ) | let Proc=(src.process.name || tgt.process.name || '''') | filter( Proc contains:anycase(''bleachbit'',''ccleaner'',''sdelete'',''eraser'',''wipe'',''shred'',''privazer'',''cleanmymac'') ) | columns timestamp=(event.time || timestamp), endpoint.name, agent.uuid, User=(src.process.user || user.name), Proc, Path=(src.process.image.path || tgt.process.image.path), Cmd=(src.process.cmdline || tgt.process.cmdline) | sort -timestamp | limit 2000'
  scope: subject
- id: zia-dlp-42
  title: Potential Security Control Tampering
  notes: 'Behavioral or process evidence of attempts to impair logging, security tools, or local protections. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: '| filter ((agent.uuid == ''{{agent_uuid}}'' OR endpoint.name contains:anycase(''{{hostname}}'') OR src.process.user contains:anycase(''{{username}}''))) | filter( event.type == ''Behavioral Indicators'' OR event.type == ''Process Creation'' ) | let Proc=(src.process.name || tgt.process.name || '''') | let Cmd=(src.process.cmdline || tgt.process.cmdline || '''') | filter( indicator.name in:anycase(''ImpairDefense'',''AntiVirusEvasion'',''EventTampering'',''EtwTampering'',''DisablingSecurityTools'',''DisableSecurityTool'',''ModifyFirewallConfiguration'') OR (Proc contains:anycase(''sc.exe'',''reg.exe'',''powershell.exe'') AND Cmd contains:anycase(''stop'',''disable'',''Set-MpPreference'',''netsh advfirewall set allprofiles state off'')) ) | columns timestamp=(event.time || timestamp), endpoint.name, agent.uuid, User=(src.process.user || user.name), Proc, Cmd, indicator.name, indicator.description | sort -timestamp | limit 2000'
  scope: subject
- id: zia-dlp-43
  title: Sensitive Cloud Activity + Endpoint Staging Timeline
  notes: 'Correlates sensitive file access from cloud logs with endpoint archive/staging behavior by user. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: '| union ( serverHost == ''google_workspace'' | filter classificationLabel in:anycase(''Highly Confidential'',''Confidential'') | filter event.name in:anycase(''download'',''sync_item_content'',''access_item_content'',''view'',''copy'',''print'',''change_document_visibility'',''change_document_access_scope'') | let user_name=(actor.email || event.owner || '''') | let signal=''workspace_sensitive_activity'' | let object=(event.doc_title || event.doc_id || ''-'') | columns timestamp=(timestamp || id.time || event.time), user_name, signal, object, detail=(event.name || event.visibility || classificationLabel), endpoint=''-'', agent=''-'' ), ( serverHost == ''box'' | filter event_type matches ''(?i).*DOWNLOAD.*|.*UPLOAD.*|.*SHARED_LINK.*|.*COLLABORATION.*'' | let user_name=(action_by.login || created_by.login || '''') | let signal=''box_file_activity'' | let object=(source.item_name || source.item_id || ''-'') | columns timestamp=(created_at || timestamp), user_name, signal, object, detail=event_type, endpoint=''-'', agent=''-'' ), ( serverHost == ''onedrive'' | filter operation matches ''(?i).*Download.*|.*Upload.*|.*Sharing.*|.*AnonymousLink.*|.*SecureLink.*|.*Permission.*'' | let user_name=(auditData.UserId || userPrincipalName || '''') | let signal=''onedrive_file_activity'' | let object=(auditData.SourceFileName || auditData.ObjectId || ''-'') | columns timestamp=(timestamp || event.time), user_name, signal, object, detail=operation, endpoint=''-'', agent=''-'' ), ( | filter( event.type == ''File Creation'' AND (tgt.file.extension in:anycase(''zip'',''rar'',''7z'',''tar'',''gz'',''tgz'',''pst'',''mbox'') OR tgt.file.path matches ''(?i).*\\\\Users\\\\.*\\\\(Downloads|Desktop|Documents)\\\\.*'' OR tgt.file.path matches ''(?i).*/(Downloads|Desktop|Documents|tmp|Temp)/.*'') ) | let user_name=(src.process.user || user.name || '''') | let signal=''endpoint_staging'' | let object=(tgt.file.path || ''-'') | columns timestamp=(event.time || timestamp), user_name, signal, object, detail=(tgt.file.extension || src.process.name), endpoint=endpoint.name, agent=agent.uuid ) | filter ((user_name contains:anycase(''{{entity}}'') OR user_name contains:anycase(''{{username}}''))) | sort user_name, timestamp | limit 3000'
  scope: subject
- id: zia-dlp-44
  title: Sensitive Activity + Exfil Tooling
  notes: 'Shows users who accessed sensitive content and also executed likely transfer tooling. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: '| union ( serverHost == ''google_workspace'' | filter classificationLabel in:anycase(''Highly Confidential'',''Confidential'') | filter event.name in:anycase(''download'',''sync_item_content'',''access_item_content'',''copy'',''print'') | let user_name=(actor.email || event.owner || '''') | let signal=''sensitive_access'' | columns timestamp=(timestamp || id.time || event.time), user_name, signal, object=(event.doc_title || event.doc_id || ''-''), detail=classificationLabel ), ( | filter( event.type == ''Process Creation'' ) | let user_name=(src.process.user || user.name || '''') | let Proc=(src.process.name || tgt.process.name || '''') | let Cmd=(src.process.cmdline || tgt.process.cmdline || '''') | filter( Proc contains:anycase(''rclone'',''scp'',''sftp'',''rsync'',''curl'',''wget'',''aws'',''gsutil'',''megacmd'',''megasync'',''onedrive'',''dropbox'',''drivefs'',''box'',''icloud'') OR Cmd contains:anycase('' rclone '','' scp '','' sftp '','' rsync '','' curl '','' wget '','' aws s3 '','' gsutil '','' mega-put '','' mega-cp '') ) | let signal=''exfil_tooling'' | columns timestamp=(event.time || timestamp), user_name, signal, object=(Proc || ''-''), detail=Cmd ) | filter ((user_name contains:anycase(''{{entity}}'') OR user_name contains:anycase(''{{username}}''))) | sort user_name, timestamp | limit 3000'
  scope: subject
- id: zia-dlp-45
  title: Sensitive Activity + ZIA Egress
  notes: 'Correlates sensitive file access with outbound web egress by user. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: '| union ( serverHost == ''google_workspace'' | filter classificationLabel in:anycase(''Highly Confidential'',''Confidential'') | filter event.name in:anycase(''download'',''sync_item_content'',''access_item_content'',''copy'',''print'') | let user_name=(actor.email || event.owner || '''') | let signal=''sensitive_access'' | columns timestamp=(timestamp || id.time || event.time), user_name, signal, object=(event.doc_title || event.doc_id || ''-''), detail=(event.name || classificationLabel) ), ( serverHost == ''zia'' | let user_name=(event.user || actor.email || '''') | let url=(event.url || event.hostname || event.dns_req || ''-'') | let method=(event.requestmethod || event.method || '''') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | let isUpload=(method in (''POST'',''PUT'') OR url contains:anycase(''upload'',''put'',''attachment'',''share'',''files'',''api'') OR outB > 5000000) | filter isUpload | let signal=''zia_egress'' | columns timestamp=(event.datetime || timestamp || sca:ingestTime), user_name, signal, object=url, detail=(event.action || host) ) | filter ((user_name contains:anycase(''{{entity}}'') OR user_name contains:anycase(''{{username}}''))) | sort user_name, timestamp | limit 3000'
  scope: subject
- id: cov-02-2
  title: Okta Source Coverage
  notes: 'What Okta data exists for this user? First/last event, count, countries, IPs. | Source: okta | Pivot if positive: Okta tab for full timeline'
  pq: 'serverHost=''{{src_okta|okta}}'' actor.alternateId=''{{entity}}''

    | let ts=(timestamp || published || event.time || sca:ingestTime)

    | filter ts = *

    | group FirstSeen.timestamp=min(ts), LastSeen.timestamp=max(ts), EventCount=count(), Countries=array_agg_distinct(client.geographicalContext.country, 10), IPs=array_agg_distinct(client.ipAddress, 10) by Source=serverHost

    | sort -EventCount

    | limit 100'
  merge:
    kind: aggregate
    key_cols:
    - Source
    sum_cols:
    - EventCount
    min_cols:
    - FirstSeen.timestamp
    max_cols:
    - LastSeen.timestamp
  scope: subject
- id: cov-03-2
  title: ZPA / Zscaler Session Coverage
  notes: 'What ZPA tunnel data exists? Confirms Zscaler was active and shows countries, public IPs. | Source: zscaler | Pivot if positive: ZIA tab for web history'
  pq: 'serverHost=''{{src_zscaler|zscaler}}''

    | filter actor.email contains:anycase(''{{entity}}'') OR actor.email contains:anycase(''{{username}}'') OR Username contains:anycase(''{{entity}}'') OR Username contains:anycase(''{{username}}'') OR event.users contains:anycase(''{{entity}}'') OR event.users contains:anycase(''{{username}}'')

    | let ts=(TimestampConnectionStart || timestamp || sca:ingestTime)

    | filter ts = *

    | group FirstSeen.timestamp=min(ts), LastSeen.timestamp=max(ts), EventCount=count(), Countries=array_agg_distinct(ClientCountryCode, 10), PublicIPs=array_agg_distinct(ClientPublicIP, 10) by Source=serverHost

    | sort -EventCount

    | limit 100'
  merge:
    kind: aggregate
    key_cols:
    - Source
    sum_cols:
    - EventCount
    min_cols:
    - FirstSeen.timestamp
    max_cols:
    - LastSeen.timestamp
  scope: subject
- id: cov-04-2
  title: ZIA Web Proxy Coverage
  notes: 'What ZIA data exists for this user? Confirms proxy was active. | Source: zia | Pivot if positive: ZIA tab'
  pq: 'serverHost=''{{src_zia|zia}}'' event.user=''{{entity}}''

    | let ts=(timestamp || event.time || sca:ingestTime)

    | filter ts = *

    | group FirstSeen.timestamp=min(ts), LastSeen.timestamp=max(ts), EventCount=count(), ClientIPs=array_agg_distinct(event.ClientIP, 10), Apps=array_agg_distinct(event.appname, 10) by Source=serverHost

    | sort -EventCount

    | limit 100'
  merge:
    kind: aggregate
    key_cols:
    - Source
    sum_cols:
    - EventCount
    min_cols:
    - FirstSeen.timestamp
    max_cols:
    - LastSeen.timestamp
  scope: subject
- id: cov-05-2
  title: EDR Source Coverage — by Username
  notes: 'What endpoint telemetry exists for this username? Confirms S1 agent was active. | Source: SentinelOne EDR | Pivot if positive: Endpoint tab'
  pq: '| filter src.process.user contains:anycase(''{{username}}'') OR event.login.userName contains:anycase(''{{username}}'')

    | let ts=(timestamp || event.time || published || sca:ingestTime)

    | filter ts = *

    | group FirstSeen.timestamp=min(ts), LastSeen.timestamp=max(ts), EventCount=count(), Endpoints=array_agg_distinct(endpoint.name, 20), AgentUUIDs=array_agg_distinct(agent.uuid, 20), EventTypes=array_agg_distinct(event.type, 20) by Source=serverHost

    | sort -EventCount

    | limit 100'
  merge:
    kind: aggregate
    key_cols:
    - Source
    sum_cols:
    - EventCount
    min_cols:
    - FirstSeen.timestamp
    max_cols:
    - LastSeen.timestamp
  scope: subject
- id: cov-06-2
  title: EDR Coverage Calendar — by Agent UUID
  notes: 'Was the endpoint active every day? Gaps in coverage could indicate device was off or agent disabled. | Source: SentinelOne EDR | Pivot if positive: Endpoint tab — check agent health dashboard for those dates'
  pq: '| filter agent.uuid == ''{{agent_uuid}}''

    | let ts=(timestamp || event.time || published || sca:ingestTime)

    | filter ts = *

    | group Events=count(), EventTypes=array_agg_distinct(event.type, 20), Users=array_agg_distinct(src.process.user, 10) by Day.timestamp=timebucket(ts, ''1d'')

    | sort -Day.timestamp

    | limit 1000'
  merge:
    kind: aggregate
    key_cols:
    - Day.timestamp
    - '''1d'')'
    sum_cols:
    - Events
  scope: subject
- id: cov-07-2
  title: Navan Travel Coverage
  notes: 'Does Navan have travel bookings for this user? Corroborates geo anomalies. | Source: navan-travel-bookings | Pivot if positive: Travel tab'
  pq: 'serverHost=''{{src_navan_travel_bookings|navan-travel-bookings}}''

    | filter passengers.person.email contains:anycase(''{{entity}}'') OR loggedAsUserName contains:anycase(''{{username}}'') OR booker.email contains:anycase(''{{entity}}'')

    | let ts=(timestamp || created || lastModified || sca:ingestTime)

    | filter ts = *

    | group FirstSeen.timestamp=min(ts), LastSeen.timestamp=max(ts), EventCount=count(), Purposes=array_agg_distinct(purpose, 10) by Source=serverHost

    | sort -EventCount

    | limit 100'
  merge:
    kind: aggregate
    key_cols:
    - Source
    sum_cols:
    - EventCount
    min_cols:
    - FirstSeen.timestamp
    max_cols:
    - LastSeen.timestamp
  scope: subject
- id: sfd-03-2
  title: Salesforce Report / Row Volume Activity
  notes: 'Did the user run reports or high-row-return activity? | Source: salesforce-realtime | Pivot if positive: Large RowsProcessed/RowsReturned -> review report name/query and business justification.'
  pq: 'serverHost=''{{src_salesforce_realtime|salesforce-realtime}}''

    | filter detail.payload.Username contains:anycase(''{{entity}}'') OR detail.payload.UserId=''{{sf_user_id}}''

    | filter detail-type contains:anycase(''Report'') OR detail.payload.ReportId = * OR detail.payload.RowsProcessed = * OR detail.payload.RowsReturned = *

    | let ts=(detail.payload.EventDate || time || timestamp || sca:ingestTime)

    | columns Time=simpledateformat(ts,''yyyy-MM-dd HH:mm:ss''), DetailType=detail-type, Operation=detail.payload.Operation, Name=detail.payload.Name, ReportId=detail.payload.ReportId, RowsProcessed=detail.payload.RowsProcessed, RowsReturned=detail.payload.RowsReturned, Format=detail.payload.Format, IP=detail.payload.SourceIp, LoginKey=detail.payload.LoginKey, Query=detail.payload.Query

    | sort -Time

    | limit 2000'
  merge:
    kind: append
  scope: subject
- id: sfd-04-2
  title: Salesforce SOQL / Queried Entities
  notes: 'What objects/entities did the user or connected app query? | Source: salesforce-realtime | Pivot if positive: Pivot ConnectedAppId, Query, or LoginKey.'
  pq: 'serverHost=''{{src_salesforce_realtime|salesforce-realtime}}''

    | filter detail.payload.Username contains:anycase(''{{entity}}'') OR detail.payload.UserId=''{{sf_user_id}}''

    | filter detail.payload.Query = * OR detail.payload.QueriedEntities = * OR detail.payload.Operation = *

    | let ts=(detail.payload.EventDate || time || timestamp || sca:ingestTime)

    | columns Time=simpledateformat(ts,''yyyy-MM-dd HH:mm:ss''), Operation=detail.payload.Operation, Entities=detail.payload.QueriedEntities, Query=detail.payload.Query, Rows=detail.payload.Records.totalSize, RowsReturned=detail.payload.RowsReturned, IP=detail.payload.SourceIp, ApiType=detail.payload.ApiType, App=detail.payload.AppName, ConnectedAppId=detail.payload.ConnectedAppId

    | sort -Time

    | limit 2000'
  merge:
    kind: append
  scope: subject
- id: sfd-08-2
  title: Salesforce File / Content Activity
  notes: 'Look for content/file actions, versions, and content size. | Source: salesforce-realtime | Pivot if positive: Correlate with ZIA/endpoint uploads and report events.'
  pq: 'serverHost=''{{src_salesforce_realtime|salesforce-realtime}}''

    | filter detail.payload.Username contains:anycase(''{{entity}}'') OR detail.payload.UserId=''{{sf_user_id}}''

    | filter detail.payload.FileAction = * OR detail.payload.ContentSize = * OR detail.payload.FileType = * OR detail-type contains:anycase(''File'')

    | let ts=(detail.payload.EventDate || time || timestamp || sca:ingestTime)

    | columns Time=simpledateformat(ts,''yyyy-MM-dd HH:mm:ss''), DetailType=detail-type, Name=detail.payload.Name, FileAction=detail.payload.FileAction, FileType=detail.payload.FileType, ContentSize=detail.payload.ContentSize, VersionId=detail.payload.VersionId, SourceIp=detail.payload.SourceIp, UserAgent=detail.payload.UserAgent

    | sort -Time

    | limit 2000'
  merge:
    kind: append
  scope: subject
- id: git-03-2
  title: GitHub Token / OAuth Activity
  notes: 'Were PATs/OAuth/GitHub Apps used or modified? | Source: ghe_server_prod/github_org_auth/github_s3 | Pivot if positive: Scope by hashed_token across all GitHub events'
  pq: 'serverHost in (''ghe_server_prod'',''github_org_auth'',''github_s3'')

    | filter actor contains:anycase(''{{username}}'') OR actor.email contains:anycase(''{{entity}}'')

    | filter action contains:anycase(''token'') OR action contains:anycase(''oauth'') OR programmatic_access_type = *

    | sort -timestamp

    | limit 2000

    | columns Time=simpledateformat(timestamp,''yyyy-MM-dd HH:mm:ss''), Actor=actor, Action=action, Repo=repo, IP=actor_ip, TokenType=programmatic_access_type, Token=hashed_token, Scopes=token_scopes, UA=user_agent'
  merge:
    kind: append
  scope: subject
- id: dlp-01-2
  title: DLP / Classification Event Coverage
  notes: 'Which DLP/classification-related fields appear for this user? | Source: DLP-capable sources | Pivot if positive: DLP-02 details, storage and endpoint timeline'
  pq: 'serverHost in (''google_workspace'',''google_workspace_prompt_drive'',''box'',''onedrive'',''prompt-security'',''zia'',''zscaler'')

    | filter actor.email contains:anycase(''{{entity}}'') OR login contains:anycase(''{{entity}}'') OR user contains:anycase(''{{entity}}'')

    | filter classificationLabel = * OR event.verdict.action = * OR event.alert.severity = * OR event.name contains:anycase(''dlp'') OR dlpdictionaries = *

    | group EventCount=count(), Labels=array_agg_distinct(classificationLabel, 20), Actions=array_agg_distinct(event.verdict.action || action, 20), Severities=array_agg_distinct(event.alert.severity || severity, 20) by Source=serverHost

    | sort -EventCount

    | limit 100'
  merge:
    kind: aggregate
    key_cols:
    - Source
    sum_cols:
    - EventCount
  scope: subject
- id: opl-06-2
  title: Orphaned / Unknown Owner Software
  notes: 'Which high-risk apps are installed on endpoints without an owner? | Source: oplockdown | Pivot if positive: Asset inventory, EDR endpoint.name, device owner lookup'
  pq: "serverHost='{{src_oplockdown|oplockdown}}' | filter (owner contains:anycase('{{entity}}')) | filter owner == '-' OR !owner OR owner == ''\n| group\n    Endpoints=estimate_distinct(endpoint.name),\n    FirstRecord.timestamp=min(timestamp),\n    LastRecord.timestamp=max(timestamp),\n    AppLastSeen.timestamp=max(lastseen)\nby app_name, tag, endpoint.name, owner\n| sort -AppLastSeen.timestamp\n| limit 2000"
  merge:
    kind: aggregate
    key_cols:
    - app_name
    - tag
    - endpoint.name
    - owner
    min_cols:
    - FirstRecord.timestamp
    max_cols:
    - LastRecord.timestamp
    - AppLastSeen.timestamp
  scope: subject
- id: zia-bp-02-2
  title: Disable Events + Blocked Activity Timeline
  notes: 'Correlate ZIA disables with blocked web events. | Source: zia + zia_disable_reason | Pivot if positive: User/device review'
  pq: '| union (serverHost=''{{src_zia|zia}}'' event.action contains:anycase(''block'') | columns timestamp,Type=''Blocked Web Event''), (serverHost=''{{src_zia_disable_reason|zia_disable_reason}}'' | columns timestamp,Type=''ZIA Disabled'') | group count=count() by timestamp=timebucket(''1h''),Type | transpose Type'
  merge:
    kind: append
  scope: environment
