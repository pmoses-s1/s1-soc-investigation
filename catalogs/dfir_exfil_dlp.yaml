name: 'DFIR: Exfil & DLP'
queries:
- id: dlp-01
  title: DLP / Classification Event Coverage
  notes: 'Which DLP/classification-related fields appear for this user? | Source: DLP-capable sources | Pivot if positive: DLP-02 details, storage and endpoint timeline'
  pq: 'serverHost in (''google_workspace'',''google_workspace_prompt_drive'',''box'',''onedrive'',''prompt-security'',''zia'',''zscaler'')

    | filter actor.email contains:anycase(''{{entity}}'') OR login contains:anycase(''{{entity}}'') OR user contains:anycase(''{{entity}}'')

    | filter classificationLabel != null OR event.verdict.action != null OR event.alert.severity != null OR event.name contains:anycase(''dlp'') OR dlpdictionaries != null

    | group EventCount=count(), Labels=array_agg_distinct(classificationLabel, 20), Actions=array_agg_distinct(event.verdict.action || action, 20), Severities=array_agg_distinct(event.alert.severity || severity, 20) by Source=serverHost

    | sort -EventCount

    | limit 100'
  scope: subject
- id: dlp-02
  title: Prompt Security / AI DLP
  notes: 'AI prompt/file activity with detectors, verdicts, or sensitive data indicators. | Source: prompt-security/anthropic-activity/claude-oltp | Pivot if positive: ZIA AI app traffic, endpoint/browser file movement'
  pq: 'serverHost in (''prompt-security'',''anthropic-activity'',''claude-oltp'')

    | filter actor.email_address contains:anycase(''{{entity}}'') OR actor.email contains:anycase(''{{entity}}'') OR user contains:anycase(''{{entity}}'')

    | sort -timestamp

    | limit 2000

    | columns Time=simpledateformat(timestamp,''yyyy-MM-dd HH:mm:ss''), Source=serverHost, Actor=actor.email_address, User=user, Type=type, App=app_id, Detector=detector, Action=action, Verdict=event.verdict.action, File=filename, IP=actor.ip_address'
  scope: subject
- id: dlp-03
  title: Endpoint Archive / Staging Indicators
  notes: 'Local archive/compression or staging prior to upload/exfil. | Source: SentinelOne EDR | Pivot if positive: ZIA/Network, Storage, GitHub/Box/Drive'
  pq: '| filter agent.uuid == ''{{agent_uuid}}'' OR src.process.user contains:anycase(''{{username}}'')

    | filter tgt.file.path matches ''(?i).*(\.zip|\.7z|\.rar|\.tar|\.gz)$'' OR src.process.cmdline matches ''(?i).*(zip|7z|rar|tar|Compress-Archive|scp|rsync|rclone|curl|wget).*''

    | sort -timestamp

    | limit 3000

    | columns Time=simpledateformat(timestamp,''yyyy-MM-dd HH:mm:ss''), Endpoint=endpoint.name, User=src.process.user, Event=event.type, Process=src.process.image.path, Cmd=src.process.cmdline, File=tgt.file.path, DstIP=dst.ip.address, DNS=dns.request'
  scope: subject
- id: zia-dlp-01
  title: Potential Upload / Egress Activity
  notes: 'Counts likely upload or egress-related events using request method, URL keywords, or outbound byte volume. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | let ts=(event.datetime || timestamp || sca:ingestTime) | let method=(event.requestmethod || event.method || '') | let url=(event.url || event.hostname || event.dns_req || '') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | let isUpload=(method in ('POST','PUT') OR url contains:anycase('upload','put','attachment','share','files','api') OR outB > 5000000) | filter isUpload | group count()
  scope: environment
- id: zia-dlp-02
  title: Unique Users with Upload-Like Activity
  notes: 'Distinct users associated with potential upload or outbound transfer behavior. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | let method=(event.requestmethod || event.method || '') | let url=(event.url || event.hostname || event.dns_req || '') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | let isUpload=(method in ('POST','PUT') OR url contains:anycase('upload','put','attachment','share','files','api') OR outB > 5000000) | filter isUpload | group users=estimate_distinct(event.user)
  scope: environment
- id: zia-dlp-03
  title: Blocked / Reset Upload Attempts
  notes: 'Upload-like events that were not cleanly allowed, useful for spotting attempted policy bypass or risky user behavior. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | let method=(event.requestmethod || event.method || '') | let url=(event.url || event.hostname || event.dns_req || '') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | let isUpload=(method in ('POST','PUT') OR url contains:anycase('upload','put','attachment','share','files','api') OR outB > 5000000) | filter isUpload AND !(event.action in ('Allow','Allowed','ALLOW')) | group count()
  scope: environment
- id: zia-dlp-04
  title: Total Outbound Bytes (All ZIA)
  notes: 'Overall outbound volume for scoped data. Use with upload panels to identify whether suspicious activity is part of broader heavy egress. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | group total_out=sum(event.outbytes || ZENTotalBytesTxClient || 0)
  scope: environment
- id: zia-dlp-05
  title: Potential Upload Activity Over Time
  notes: 'Daily trend of likely upload or exfil-related traffic. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | let ts=(event.datetime || timestamp || sca:ingestTime) | let method=(event.requestmethod || event.method || '') | let url=(event.url || event.hostname || event.dns_req || '') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | let isUpload=(method in ('POST','PUT') OR url contains:anycase('upload','put','attachment','share','files','api') OR outB > 5000000) | filter isUpload | group events=count(), users=estimate_distinct(event.user) by timestamp=timebucket(ts,'1d') | sort -timestamp
  scope: environment
- id: zia-dlp-06
  title: Top Users by Outbound Upload Volume
  notes: 'Ranks users by total outbound volume on upload-like events. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | let method=(event.requestmethod || event.method || '') | let url=(event.url || event.hostname || event.dns_req || '') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | let isUpload=(method in ('POST','PUT') OR url contains:anycase('upload','put','attachment','share','files','api') OR outB > 5000000) | filter isUpload | group total_out=sum(outB), events=count(), destinations=estimate_distinct(event.hostname || event.url || event.dns_req) by event.user, event.deviceowner, event.devicehostname | sort -total_out | limit 500
  scope: environment
- id: zia-dlp-07
  title: Raw Upload / POST Activity
  notes: 'Primary upload hunting panel. Uses HTTP methods when present, otherwise URL keywords and outbound bytes as a proxy. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | let ts=(event.datetime || timestamp || sca:ingestTime) | let method=(event.requestmethod || event.method || '') | let url=(event.url || event.hostname || event.dns_req || '') | let host=(event.hostname || event.url || event.dns_req || '') | let file=(event.filename || event.file_name || event.uploadedfilename || '') | let filetype=(event.filetype || event.contenttype || '') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | let isUpload=(method in ('POST','PUT') OR url contains:anycase('upload','put','attachment','share','files','api') OR outB > 5000000) | filter isUpload | columns ts, event.user, event.deviceowner, event.devicehostname, method, url, host, event.appname, file, filetype, outB, event.action, event.rulelabel, event.urlcategory, event.destcountry | sort -ts | limit 5000
  scope: subject
- id: zia-dlp-08
  title: Top Upload Destinations
  notes: 'Most common upload destinations by event count and outbound volume. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | let method=(event.requestmethod || event.method || '') | let host=(event.hostname || event.url || event.dns_req || '') | let url=(event.url || event.hostname || event.dns_req || '') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | let isUpload=(method in ('POST','PUT') OR url contains:anycase('upload','put','attachment','share','files','api') OR outB > 5000000) | filter isUpload | group events=count(), total_out=sum(outB), users=estimate_distinct(event.user) by host, event.appname, event.urlcategory | sort -total_out | limit 500
  scope: environment
- id: zia-dlp-09
  title: Suspicious File Types / Extensions
  notes: 'Highlights archive, mail, database, and bulk-transfer file types when available in logs. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | let ts=(event.datetime || timestamp || sca:ingestTime) | let method=(event.requestmethod || event.method || '') | let url=(event.url || event.hostname || event.dns_req || '') | let fname=(event.filename || event.file_name || event.uploadedfilename || '') | let ftype=(event.filetype || event.contenttype || '') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | let suspicious=(fname contains:anycase('.zip','.rar','.7z','.pst','.mbox','.sql','.db','.bak','.tar','.gz','.tgz','.csv','.xlsx','.docx','.pdf') OR ftype contains:anycase('zip','rar','7z','pst','octet-stream')) | let isUpload=(method in ('POST','PUT') OR url contains:anycase('upload','put','attachment','share','files','api') OR outB > 5000000) | filter isUpload AND suspicious | columns ts, event.user, event.deviceowner, event.devicehostname, fname, ftype, outB, url, event.appname, event.action, event.rulelabel | sort -ts | limit 5000
  scope: subject
- id: zia-dlp-10
  title: Personal Cloud Storage
  notes: 'Uploads or traffic to personal cloud storage services. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | let ts=(event.datetime || timestamp || sca:ingestTime) | let host=(event.hostname || event.url || event.dns_req || '') | filter host contains:anycase('drive.google.com','dropbox.com','dropboxapi.com','icloud.com','mega.nz','mediafire.com','box.com') | columns ts, event.user, event.deviceowner, event.devicehostname, host, event.url, event.appname, event.outbytes, event.action, event.rulelabel | sort -ts | limit 5000
  scope: subject
- id: zia-dlp-11
  title: File Sharing Services
  notes: 'Traffic to common file sharing and transfer services. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | let ts=(event.datetime || timestamp || sca:ingestTime) | let host=(event.hostname || event.url || event.dns_req || '') | filter host contains:anycase('wetransfer.com','mega.nz','mediafire.com','sendspace.com','transfernow.net','gofile.io','file.io','dropbox.com') | columns ts, event.user, event.deviceowner, event.devicehostname, host, event.url, event.appname, event.outbytes, event.action, event.rulelabel | sort -ts | limit 5000
  scope: subject
- id: zia-dlp-12
  title: Source Code Repositories
  notes: 'Traffic to GitHub, GitLab, Bitbucket and similar developer platforms that can be used for IP exfiltration. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | let ts=(event.datetime || timestamp || sca:ingestTime) | let host=(event.hostname || event.url || event.dns_req || '') | filter host contains:anycase('github.com','githubusercontent.com','gitlab.com','bitbucket.org') | columns ts, event.user, event.deviceowner, event.devicehostname, host, event.url, event.appname, event.outbytes, event.action, event.rulelabel | sort -ts | limit 5000
  scope: subject
- id: zia-dlp-13
  title: Paste / Public Text Dump Sites
  notes: 'Small but high-risk leakage path for credentials, tokens, snippets, and customer data. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | let ts=(event.datetime || timestamp || sca:ingestTime) | let host=(event.hostname || event.url || event.dns_req || '') | filter host contains:anycase('pastebin.com','gist.github.com','ghostbin.com','paste.ee','rentry.co','dpaste.com','hastebin.com') | columns ts, event.user, event.deviceowner, event.devicehostname, host, event.url, event.appname, event.outbytes, event.action, event.rulelabel | sort -ts | limit 5000
  scope: subject
- id: zia-dlp-14
  title: Large Uploads
  notes: 'Single-event large uploads. Threshold can be tuned; starting point is 50 MB. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | let ts=(event.datetime || timestamp || sca:ingestTime) | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | filter outB >= 50000000 | columns ts, event.user, event.deviceowner, event.devicehostname, event.hostname, event.url, event.appname, outB, event.action, event.rulelabel, event.destcountry | sort -outB | limit 5000
  scope: subject
- id: zia-dlp-15
  title: High Frequency Uploads in Short Window
  notes: 'Potential staging or chunked exfil behavior. Looks for repeated upload-like events in 15-minute windows. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | let ts=(event.datetime || timestamp || sca:ingestTime) | let method=(event.requestmethod || event.method || '') | let url=(event.url || event.hostname || event.dns_req || '') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | let isUpload=(method in ('POST','PUT') OR url contains:anycase('upload','put','attachment','share','files','api') OR outB > 5000000) | filter isUpload | group events=count(), total_out=sum(outB), destinations=estimate_distinct(event.hostname || event.url || event.dns_req) by bucket=timebucket(ts,'15m'), event.user, event.devicehostname | filter events >= 10 | sort -total_out | limit 1000
  scope: subject
- id: zia-dlp-16
  title: After Hours Upload Activity
  notes: 'Upload-like activity outside standard business hours. Adjust hours as needed for your org. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | let ts=(event.datetime || timestamp || sca:ingestTime) | let hour=hourofday(ts) | let method=(event.requestmethod || event.method || '') | let url=(event.url || event.hostname || event.dns_req || '') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | let isUpload=(method in ('POST','PUT') OR url contains:anycase('upload','put','attachment','share','files','api') OR outB > 5000000) | filter isUpload AND (hour < 7 OR hour > 19) | columns ts, event.user, event.deviceowner, event.devicehostname, event.hostname, event.url, event.appname, outB, event.action, event.rulelabel | sort -ts | limit 5000
  scope: subject
- id: zia-dlp-17
  title: Unsanctioned / Shadow IT App Use
  notes: 'Applications with upload capability that may not be sanctioned. Review app names and categories for policy tuning. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' event.appname=* | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | group events=count(), users=estimate_distinct(event.user), total_out=sum(event.outbytes || 0) by event.appname, event.urlcategory | sort -total_out | limit 500
  scope: subject
- id: zia-dlp-18
  title: Webmail Activity
  notes: 'Traffic to personal or browser-based mail platforms that could be used for outbound attachments. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | let ts=(event.datetime || timestamp || sca:ingestTime) | let host=(event.hostname || event.url || event.dns_req || '') | filter host contains:anycase('mail.google.com','gmail.com','outlook.live.com','mail.yahoo.com','proton.me','protonmail.com') | columns ts, event.user, event.deviceowner, event.devicehostname, host, event.url, event.outbytes, event.action, event.rulelabel | sort -ts | limit 5000
  scope: subject
- id: zia-dlp-19
  title: VPN / Proxy / Anonymizer Usage
  notes: 'Potential attempts to evade monitoring or hide destination context. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | let ts=(event.datetime || timestamp || sca:ingestTime) | let host=(event.hostname || event.url || event.dns_req || '') | filter host contains:anycase('torproject.org','protonvpn','nordvpn','expressvpn','surfshark','tunnelbear','hide.me','openvpn') OR event.urlcategory contains:anycase('anonymizer','proxy avoidance') | columns ts, event.user, event.deviceowner, event.devicehostname, host, event.url, event.action, event.rulelabel, event.destcountry | sort -ts | limit 5000
  scope: subject
- id: zia-dlp-20
  title: New / Low Reputation / Unknown Destinations
  notes: 'A rough proxy using unknown or miscellaneous categories when true first-seen metadata is unavailable in the log stream. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | filter event.ipcat contains:anycase('unknown') OR event.urlcategory contains:anycase('unknown') OR event.urlsupercategory contains:anycase('unknown') | group events=count(), users=estimate_distinct(event.user), total_out=sum(event.outbytes || 0) by event.hostname, event.url, event.ipcat, event.urlcategory | sort -total_out | limit 500
  scope: subject
- id: zia-dlp-21
  title: Blocked vs Allowed by Destination
  notes: 'Shows which destinations users attempted and whether controls stopped the traffic. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | group events=count(), users=estimate_distinct(event.user), total_out=sum(event.outbytes || 0) by event.action, event.hostname, event.appname, event.rulelabel | sort -events | limit 500
  scope: subject
- id: zia-dlp-22
  title: Allowed High-Risk Destinations
  notes: 'Allowed traffic to destinations that often merit tighter controls or alerting. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | let host=(event.hostname || event.url || event.dns_req || '') | filter event.action in ('Allow','Allowed','ALLOW') | filter host contains:anycase('wetransfer','mega','mediafire','pastebin','gist.github','dropbox','drive.google','icloud','github','gitlab','bitbucket') | group events=count(), users=estimate_distinct(event.user), total_out=sum(event.outbytes || 0) by host, event.appname, event.urlcategory, event.rulelabel | sort -total_out | limit 500
  scope: subject
- id: zia-dlp-23
  title: Policy Rules Generating Upload Resets / Blocks
  notes: 'Useful for validating whether existing controls are firing where expected. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | let method=(event.requestmethod || event.method || '') | let url=(event.url || event.hostname || event.dns_req || '') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | let isUpload=(method in ('POST','PUT') OR url contains:anycase('upload','put','attachment','share','files','api') OR outB > 5000000) | filter isUpload AND !(event.action in ('Allow','Allowed','ALLOW')) | group events=count(), users=estimate_distinct(event.user), total_out=sum(outB) by event.rulelabel, event.action | sort -events | limit 500
  scope: subject
- id: zia-dlp-24
  title: User Risk Rollup
  notes: 'Starter behavioral score using upload volume, after-hours activity, destination diversity, and high-risk destinations. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | let ts=(event.datetime || timestamp || sca:ingestTime) | let hour=hourofday(ts) | let method=(event.requestmethod || event.method || '') | let host=(event.hostname || event.url || event.dns_req || '') | let url=(event.url || event.hostname || event.dns_req || '') | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | let isUpload=(method in ('POST','PUT') OR url contains:anycase('upload','put','attachment','share','files','api') OR outB > 5000000) | let isAfterHours=(hour < 7 OR hour > 19) | let isHighRisk=(host contains:anycase('wetransfer','mega','mediafire','pastebin','gist.github','dropbox','drive.google','icloud','github','gitlab','bitbucket')) | filter isUpload | group events=count(), total_out=sum(outB), destinations=estimate_distinct(host), after_hours=count(if(isAfterHours,1,null)), high_risk=count(if(isHighRisk,1,null)) by event.user, event.deviceowner, event.devicehostname | sort -total_out | limit 500
  scope: subject
- id: zia-dlp-25
  title: Potential Staging Behavior
  notes: 'Multiple smaller outbound events before larger transfers. Useful as a proxy where explicit file telemetry is unavailable. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | let ts=(event.datetime || timestamp || sca:ingestTime) | let outB=(event.outbytes || ZENTotalBytesTxClient || 0) | group events=count(), small_uploads=count(if(outB > 1000000 AND outB < 10000000,1,null)), large_uploads=count(if(outB >= 10000000,1,null)), total_out=sum(outB) by bucket=timebucket(ts,'1h'), event.user, event.devicehostname | filter small_uploads >= 3 AND large_uploads >= 1 | sort -total_out | limit 1000
  scope: subject
- id: zia-dlp-26
  title: All ZIA Raw Activity
  notes: 'Raw drilldown panel for ad hoc investigation and pivots by user, device, domain, country, or rule. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
  pq: serverHost='{{src_zia|zia}}' | filter ((event.user contains:anycase('{{entity}}') OR event.deviceowner contains:anycase('{{entity}}'))) | let ts=(event.datetime || timestamp || sca:ingestTime) | columns ts, event.user, event.deviceowner, event.devicehostname, event.requestmethod, event.method, event.url, event.hostname, event.appname, event.urlcategory, event.urlsupercategory, event.destcountry, event.action, event.rulelabel, event.inbytes, event.outbytes, event.threatcat, event.threatname, event.threat_score, event.threat_severity | sort -ts | limit 10000
  scope: subject
- id: zia-dlp-27
  title: Large Archive Creation (>50MB)
  notes: 'High-signal staging panel. Finds large archives created locally before potential transfer or exfiltration. | Source: zia / EDR / google_workspace / box / onedrive depending on query | Pivot if positive: User timeline, endpoint staging, source app logs, policy review'
