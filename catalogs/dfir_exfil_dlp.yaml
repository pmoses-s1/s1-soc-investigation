al, object, detail=(tgt.file.extension || src.process.name), endpoint=endpoint.name, agent=agent.uuid ) | filter ((user_name contains:anycase(''{{entity}}'') OR user_name contains:anycase(''{{username}}''))) | sort user_name, timestamp | limit 3000'
