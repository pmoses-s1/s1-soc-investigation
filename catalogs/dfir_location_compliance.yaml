- id: loc-pubip-02
  title: Public IP Stability and First Last Seen
  notes: Summarizes each public IP across all supported remote sources with days active and source systems. Useful for residency pattern review and recurring-network evidence.
  pq: "| union\n  (serverHost='okta' actor.alternateId contains:anycase('{{entity}}') | columns ts=(published || timestamp), Source='Okta', IP=client.ipAddress, Country=client.geographicalContext.country, City=client.geographicalContext.city),\n  (serverHost='zscaler' | filter actor.email contains:anycase('{{entity}}') OR Username contains:anycase('{{entity}}') OR event.users contains:anycase('{{entity}}') OR actor.email contains:anycase('{{username}}') OR Username contains:anycase('{{username}}') OR event.users contains:anycase('{{username}}') | columns ts=(TimestampConnectionStart || timestamp), Source='ZPA', IP=ClientPublicIP, Country=ClientCountryCode, City=ClientCity),\n  (serverHost='Azure' UserPrincipalName contains:anycase('{{entity}}') | columns ts=(createdDateTime || timestamp), Source='Azure', IP=IPAddress, Country=LocationDetails.countryOrRegion, City=LocationDetails.city),\n  (serverHost='slack' actor.user.email contains:anycase('{{entity}}') | columns ts=timestamp, Source='Slack', IP=context.ip_address, Country='', City=context.location.name),\n  (serverHost='box' created_by.login contains:anycase('{{entity}}') | columns ts=timestamp, Source='Box', IP=ip_address, Country='', City=''),\n  (serverHost='atlassian-cloud-enterprise' | filter attributes.actor.email contains:anycase('{{entity}}') OR attributes.actor.name contains:anycase('{{username}}') | columns ts=(attributes.time || timestamp), Source='Atlassian', IP=attributes.location.ip, Country=attributes.location.countryName, City=attributes.location.city)\n| filter ts != null AND IP != null AND IP != ''\n| group FirstSeen.timestamp=min(ts), LastSeen.timestamp=max(ts), Days=estimate_distinct(timebucket(ts,'1d')), Sources=array_agg_distinct(Source,20), Countries=array_agg_distinct(Country,20), Cities=array_agg_distinct(City,20), Events=count() by IP\n| sort -Days\n| limit 1000"
  merge:
    strategy: append
  scope: subject
- id: loc-report-02
  title: Remote Evidence Outside Expected Country
  notes: Shows days where Okta or ZPA remote evidence indicates activity outside {{expected_country_code}}. For UK use GB.
  pq: "| union\n  (serverHost='okta' actor.alternateId contains:anycase('{{entity}}') outcome.result='SUCCESS' client.geographicalContext.country=* | filter eventType contains ('user.session.start','user.authentication.sso','user.authentication.auth_via_mfa') | columns ts=(published || timestamp), Source='Okta', Country=client.geographicalContext.country, City=client.geographicalContext.city, IP=client.ipAddress),\n  (serverHost='zscaler' | filter actor.email contains:anycase('{{entity}}') OR Username contains:anycase('{{entity}}') OR event.users contains:anycase('{{entity}}') OR actor.email contains:anycase('{{username}}') OR Username contains:anycase('{{username}}') OR event.users contains:anycase('{{username}}') | columns ts=(TimestampConnectionStart || timestamp), Source='ZPA', Country=ClientCountryCode, City=ClientCity, IP=ClientPublicIP)\n| filter ts != null AND Country != null AND Country != '' AND Country != '{{expected_country_code}}'\n| group Sources=array_agg_distinct(Source,10), Countries=array_agg_distinct(Country,10), Cities=array_agg_distinct(City,20), IPs=array_agg_distinct(IP,20), Events=count() by Day.timestamp=timebucket(ts,'1d')\n| sort -Day.timestamp\n| limit 1000"
  merge:
    strategy: append
  scope: subject
- id: loc-report-03
  title: Expected Country vs Foreign Country Day Counts
  notes: Daily and aggregate starter for days in expected country vs outside expected country, based on Okta and ZPA remote evidence. Validate with endpoint and badge sources.
  pq: "| union\n  (serverHost='okta' actor.alternateId contains:anycase('{{entity}}') outcome.result='SUCCESS' client.geographicalContext.country=* | filter eventType contains ('user.session.start','user.authentication.sso','user.authentication.auth_via_mfa') | columns ts=(published || timestamp), Source='Okta', Country=client.geographicalContext.country),\n  (serverHost='zscaler' | filter actor.email contains:anycase('{{entity}}') OR Username contains:anycase('{{entity}}') OR event.users contains:anycase('{{entity}}') OR actor.email contains:anycase('{{username}}') OR Username contains:anycase('{{username}}') OR event.users contains:anycase('{{username}}') | columns ts=(TimestampConnectionStart || timestamp), Source='ZPA', Country=ClientCountryCode)\n| filter ts != null AND Country != null AND Country != ''\n| let CountryBucket=(Country == '{{expected_country_code}}' ? 'Expected Country' : 'Outside Expected Country')\n| group Events=count(), Sources=array_agg_distinct(Source,10), Countries=array_agg_distinct(Country,10) by Day.timestamp=timebucket(ts,'1d'), CountryBucket\n| sort -Day.timestamp\n| limit 2000"
  merge:
    strategy: append
  scope: subject
- id: loc-contradiction-01
  title: Badge Access and Remote Foreign Activity Same Day
  notes: Flags days where badge access exists and remote Okta/ZPA evidence also shows activity outside {{expected_country_code}}. Review carefully for VPN/proxy, travel, clock skew, shared devices, or badge misuse.
  pq: "| union\n  (serverHost='acm_xml' | let User=plasectrxFname+'.'+plasectrxLname | filter User contains:anycase('{{username}}') | columns ts=(timestamp || sca:ingestTime), Evidence='Badge', Country='Office', Location=plasectrxIdentitySiteLocation, IP=''),\n  (serverHost='okta' actor.alternateId contains:anycase('{{entity}}') outcome.result='SUCCESS' client.geographicalContext.country=* | filter eventType contains ('user.session.start','user.authentication.sso','user.authentication.auth_via_mfa') | columns ts=(published || timestamp), Evidence='Okta', Country=client.geographicalContext.country, Location=client.geographicalContext.city, IP=client.ipAddress),\n  (serverHost='zscaler' | filter actor.email contains:anycase('{{entity}}') OR Username contains:anycase('{{entity}}') OR event.users contains:anycase('{{entity}}') OR actor.email contains:anycase('{{username}}') OR Username contains:anycase('{{username}}') OR event.users contains:anycase('{{username}}') | columns ts=(TimestampConnectionStart || timestamp), Evidence='ZPA', Country=ClientCountryCode, Location=ClientCity, IP=ClientPublicIP)\n| filter ts != null\n| group EvidenceTypes=array_agg_distinct(Evidence,10), Countries=array_agg_distinct(Country,10), Locations=array_agg_distinct(Location,20), IPs=array_agg_distinct(IP,20), Events=count(), ForeignEvents=count(if(Country != '{{expected_country_code}}' AND Country != 'Office' AND Country != '' AND Country != null,1,null)), BadgeEvents=count(if(Evidence == 'Badge',1,null)) by Day.timestamp=timebucket(ts,'1d')\n| filter BadgeEvents > 0 AND ForeignEvents > 0\n| sort -Day.timestamp\n| limit 1000"
  merge:
    strategy: append
  scope: subject
- id: loc-contradiction-02
  title: Endpoint LAN and Foreign Remote Activity Same Day
  notes: Flags days where endpoint-native LAN activity exists and Okta/ZPA shows foreign remote activity. Useful for identifying VPN/proxy or travel contradictions.
  pq: "| union\n  (| filter((endpoint.name contains:anycase('{{hostname}}') OR agent.uuid == '{{agent_uuid}}') AND event.type == 'IP Connect' AND src.ip.address=*) | columns ts=(event.time || timestamp), Evidence='EndpointLAN', Country='Endpoint', Location=src.ip.address, IP=src.ip.address),\n  (serverHost='okta' actor.alternateId contains:anycase('{{entity}}') outcome.result='SUCCESS' client.geographicalContext.country=* | filter eventType contains ('user.session.start','user.authentication.sso','user.authentication.auth_via_mfa') | columns ts=(published || timestamp), Evidence='Okta', Country=client.geographicalContext.country, Location=client.geographicalContext.city, IP=client.ipAddress),\n  (serverHost='zscaler' | filter actor.email contains:anycase('{{entity}}') OR Username contains:anycase('{{entity}}') OR event.users contains:anycase('{{entity}}') OR actor.email contains:anycase('{{username}}') OR Username contains:anycase('{{username}}') OR event.users contains:anycase('{{username}}') | columns ts=(TimestampConnectionStart || timestamp), Evidence='ZPA', Country=ClientCountryCode, Location=ClientCity, IP=ClientPublicIP)\n| filter ts != null\n| group EvidenceTypes=array_agg_distinct(Evidence,10), Countries=array_agg_distinct(Country,10), Locations=array_agg_distinct(Location,20), IPs=array_agg_distinct(IP,20), Events=count(), ForeignEvents=count(if(Country != '{{expected_country_code}}' AND Country != 'Endpoint' AND Country != '' AND Country != null,1,null)), EndpointEvents=count(if(Evidence == 'EndpointLAN',1,null)) by Day.timestamp=timebucket(ts,'1d')\n| filter EndpointEvents > 0 AND ForeignEvents > 0\n| sort -Day.timestamp\n| limit 1000"
  merge:
    strategy: append
  scope: subject
- id: loc-net-01
  title: DNS or Network Source IP Corroboration
  notes: Secondary fallback for network corroboration when Zscaler coverage is incomplete. Attribute carefully because DNS/PANW records may be weaker for personnel attribution.
  pq: 'serverHost in (''dns-query-logs'',''panw'',''pfsense'',''olympus-vpc-flowlogs'',''aws-network-firewall'')

    | filter srcaddr == ''{{ip}}'' OR event.src_ip == ''{{ip}}'' OR SourceAddress == ''{{ip}}'' OR src.ip.address == ''{{ip}}'' OR sourceIPAddress == ''{{ip}}'' OR user contains:anycase(''{{entity}}'') OR login contains:anycase(''{{entity}}'') OR SourceUser contains:anycase(''{{username}}'')

    | let ts=(timestamp || event.time || sca:ingestTime)

    | group Events=count(), FirstSeen.timestamp=min(ts), LastSeen.timestamp=max(ts), DstIPs=array_agg_distinct(event.dest_ip || DestinationAddress || dst.ip.address,20), Questions=array_agg_distinct(question || event.dns.request,20) by Source=serverHost

    | sort -Events

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-report-04
  title: Complete Evidence Timeline
  notes: One merged timeline of physical, endpoint, identity, SaaS, travel, and corroborating location evidence. Use for final investigation review and report drafting.
  pq: "| union\n  (serverHost='acm_xml' | let User=plasectrxFname+'.'+plasectrxLname | filter User contains:anycase('{{username}}') | columns ts=(timestamp || sca:ingestTime), Source='Badge', Evidence='Physical office access', Location=plasectrxIdentitySiteLocation, IP='', Detail=plasectrxEvent),\n  (| filter((endpoint.name contains:anycase('{{hostname}}') OR agent.uuid == '{{agent_uuid}}') AND event.type == 'IP Connect' AND src.ip.address=*) | columns ts=(event.time || timestamp), Source='Endpoint', Evidence='Endpoint LAN/IP activity', Location=src.ip.address, IP=src.ip.address, Detail=dst.ip.address),\n  (serverHost='okta' actor.alternateId contains:anycase('{{entity}}') | columns ts=(published || timestamp), Source='Okta', Evidence=eventType, Location=(client.geographicalContext.city+', '+client.geographicalContext.country), IP=client.ipAddress, Detail=outcome.result),\n  (serverHost='zscaler' | filter actor.email contains:anycase('{{entity}}') OR Username contains:anycase('{{entity}}') OR event.users contains:anycase('{{entity}}') OR actor.email contains:anycase('{{username}}') OR Username contains:anycase('{{username}}') OR event.users contains:anycase('{{username}}') | columns ts=(TimestampConnectionStart || timestamp), Source='ZPA', Evidence=Application, Location=(ClientCity+', '+ClientCountryCode), IP=ClientPublicIP, Detail=ConnectionStatus),\n  (serverHost='Azure' UserPrincipalName contains:anycase('{{entity}}') | columns ts=(createdDateTime || timestamp), Source='Azure', Evidence=AppDisplayName, Location=(LocationDetails.city+', '+LocationDetails.countryOrRegion), IP=IPAddress, Detail=ResultType),\n  (serverHost='slack' actor.user.email contains:anycase('{{entity}}') | columns ts=timestamp, Source='Slack', Evidence=action, Location=context.location.name, IP=context.ip_address, Detail=context.ua),\n  (serverHost='navan-travel-bookings' | filter passengers.person.email contains:anycase('{{entity}}') OR passengers.person.email contains:anycase('{{username}}') OR loggedAsUserName contains:anycase('{{username}}') OR booker.email contains:anycase('{{entity}}') | columns ts=(timestamp || created || lastModified), Source='Navan', Evidence='Travel booking', Location=(origin.city+' to '+destination.city), IP='', Detail=tripName)\n| filter ts != null\n| sort -ts\n| limit 10000"
  merge:
    strategy: append
  scope: subject
- id: loc-gws-login-01
  title: Google Workspace Login Timeline
  notes: Dedicated Google Workspace login/auth timeline. Separates real sign-ins from general Workspace activity and helps corroborate Okta, Azure, and travel findings.
  pq: 'serverHost=''google_workspace'' actor.email contains:anycase(''{{entity}}'')

    | filter id.applicationName == ''login'' OR event.name in:anycase (''login_success'',''login_failure'',''login_challenge'',''login_verification'',''logout'',''suspicious_login'',''suspicious_programmatic_login'')

    | let ts=(timestamp || id.time || event.time || sca:ingestTime)

    | sort -ts

    | limit 5000

    | columns Time.timestamp=ts, Actor=actor.email, App=id.applicationName, Event=event.name, IP=ipAddress, Region=networkInfo.regionCode, Subdivision=networkInfo.subdivisionCode, ASN=networkInfo.ipAsn, OAuthApp=actor.applicationInfo.applicationName'
  merge:
    strategy: append
  scope: subject
- id: loc-workdayloc-01
  title: Workday Location and Signon Detail
  notes: Dedicated Workday and workday-location query for HR location context and sign-on IP review. Useful for residency/compliance cases where official HR location matters.
  pq: 'serverHost in (''workday'',''workday-location'')

    | let User=(serverHost == ''workday'' ? System_Account : (firstname + '' '' + lastname))

    | let Action=(serverHost == ''workday'' ? ''Sign On'' : ''Location Update'')

    | let Details=(serverHost == ''workday'' ? Authentication_Type : (''Region: '' + Countryregion))

    | let IP=(serverHost == ''workday'' ? Signon_IP_Address : ''Internal HR System'')

    | let ts=(timestamp || event.time || sca:ingestTime)

    | filter User contains:anycase(''{{username}}'') OR User contains:anycase(''{{entity}}'')

    | sort -ts

    | limit 2000

    | columns Time.timestamp=ts, Source=serverHost, User, Action, IP, Details'
  merge:
    strategy: append
  scope: subject
- id: loc-ns-01
  title: NetSuite Login IP Timeline
  notes: NetSuite authentication timeline for ERP users. Useful when the subject touches Finance, Accounting, or FP&A systems and you need another source-IP/location corroboration point.
  pq: 'serverHost=''netsuite''

    | filter user contains:anycase(''{{entity}}'') OR user contains:anycase(''{{username}}'')

    | filter event_type contains:anycase(''login'',''logout'',''failed'',''sso'')

    | let ts=(timestamp || event.time || sca:ingestTime)

    | sort -ts

    | limit 3000

    | columns Time.timestamp=ts, User=user, EventType=event_type, IP=ip_address, Role=role, RecordType=record_type, RecordID=record_id'
  merge:
    strategy: append
  scope: subject
