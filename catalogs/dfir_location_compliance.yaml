  merge:
    strategy: append
  scope: subject
- id: loc-pubip-01
  title: Combined Public IP Daily Summary
  notes: Daily public IP rollup from Okta, ZPA, Azure, Slack, Box, GitHub, Atlassian, AWS, JumpCloud, and 1Password where available. Use to identify stable home networks, travel networks, VPNs, and country changes.
  pq: "| union\n  (serverHost='okta' actor.alternateId contains:anycase('{{entity}}') | columns ts=(published || timestamp), Source='Okta', User=actor.alternateId, IP=client.ipAddress, Country=client.geographicalContext.country, City=client.geographicalContext.city, Detail=eventType),\n  (serverHost='zscaler' | filter actor.email contains:anycase('{{entity}}') OR Username contains:anycase('{{entity}}') OR event.users contains:anycase('{{entity}}') OR actor.email contains:anycase('{{username}}') OR Username contains:anycase('{{username}}') OR event.users contains:anycase('{{username}}') | columns ts=(TimestampConnectionStart || timestamp), Source='ZPA', User=(actor.email || Username || event.users), IP=ClientPublicIP, Country=ClientCountryCode, City=ClientCity, Detail=Application),\n  (serverHost='Azure' UserPrincipalName contains:anycase('{{entity}}') | columns ts=(createdDateTime || timestamp), Source='Azure', User=UserPrincipalName, IP=IPAddress, Country=LocationDetails.countryOrRegion, City=LocationDetails.city, Detail=AppDisplayName),\n  (serverHost='slack' actor.user.email contains:anycase('{{entity}}') | columns ts=timestamp, Source='Slack', User=actor.user.email, IP=context.ip_address, Country='', City=context.location.name, Detail=action),\n  (serverHost='box' created_by.login contains:anycase('{{entity}}') | columns ts=timestamp, Source='Box', User=created_by.login, IP=ip_address, Country='', City='', Detail=event_type),\n  (serverHost='atlassian-cloud-enterprise' | filter attributes.actor.email contains:anycase('{{entity}}') OR attributes.actor.name contains:anycase('{{username}}') | columns ts=(attributes.time || timestamp), Source='Atlassian', User=attributes.actor.email, IP=attributes.location.ip, Country=attributes.location.countryName, City=attributes.location.city, Detail=attributes.action),\n  (serverHost in ('github_s3','ghe_server_prod') | filter actor contains:anycase('{{username}}') OR gh.actor.login contains:anycase('{{username}}') | columns ts=timestamp, Source='GitHub', User=(actor || gh.actor.login), IP=(actor_ip || actor.ip), Country='', City='', Detail=action),\n  (serverHost='jumpcloud' | filter initiated_by.email contains:anycase('{{entity}}') OR username contains:anycase('{{username}}') OR resource.email contains:anycase('{{entity}}') | columns ts=timestamp, Source='JumpCloud', User=(initiated_by.email || username || resource.email), IP=client_ip, Country='', City='', Detail=event_type),\n  (serverHost in ('aws','nglz-cloudtrail','OW-CloudTrail') | filter userIdentity.userName contains:anycase('{{username}}') OR userIdentity.arn contains:anycase('{{username}}') OR userIdentity.userName contains:anycase('{{entity}}') | columns ts=timestamp, Source='CloudTrail', User=(userIdentity.userName || userIdentity.arn), IP=sourceIPAddress, Country='', City='', Detail=eventName),\n  (serverHost='1password' | let User=replace(string(actor_details.email)+string(user.email)+string(actor.email),'null','') | filter User contains:anycase('{{entity}}') | columns ts=timestamp, Source='1Password', User, IP=(client.ip_address || session.ip), Country=location.country, City=location.city, Detail=action)\n| filter ts != null\n| group Sources=array_agg_distinct(Source,20), Countries=array_agg_distinct(Country,20), Cities=array_agg_distinct(City,20), Details=array_agg_distinct(Detail,20), Events=count() by Day.timestamp=timebucket(ts,'1d'), IP\n| sort -Day.timestamp\n| limit 5000"
  merge:
    strategy: append
