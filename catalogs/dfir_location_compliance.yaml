name: 'DFIR: Location Compliance'
queries:
- id: loc-cov-01
  title: Log Sources With Target Email
  notes: Find which sources contain the subject email. Start here before drawing conclusions from any single source.
  pq: '* contains ''{{entity}}''

    | let ts=(timestamp || published || created_at || time || receive_time || event.time || sca:ingestTime)

    | filter ts != null

    | group FirstSeen.timestamp=min(ts), LastSeen.timestamp=max(ts), EventCount=count() by Source=serverHost

    | sort -EventCount

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-cov-02
  title: Log Sources With Target Username
  notes: Find which sources contain the subject username. Useful where sources log username instead of email.
  pq: '* contains ''{{username}}''

    | let ts=(timestamp || published || created_at || time || receive_time || event.time || sca:ingestTime)

    | filter ts != null

    | group FirstSeen.timestamp=min(ts), LastSeen.timestamp=max(ts), EventCount=count() by Source=serverHost

    | sort -EventCount

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-cov-03
  title: Daily Activity Across Sources
  notes: Daily source coverage for the subject email across the investigation period.
  pq: '* contains ''{{entity}}''

    | let ts=(timestamp || published || created_at || time || receive_time || event.time || sca:ingestTime)

    | filter ts != null

    | group Events=count(), Sources=array_agg_distinct(serverHost,20) by Day.timestamp=timebucket(ts,''1d'')

    | sort -Day.timestamp

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-okta-01
  title: Okta Country City Summary
  notes: Okta country/city summary. Treat as supporting attribution, not sole proof of physical location.
  pq: 'serverHost=''okta'' actor.alternateId contains:anycase(''{{entity}}'') client.geographicalContext.country=*

    | let ts=(timestamp || published || sca:ingestTime)

    | group Events=count(), FirstSeen.timestamp=min(ts), LastSeen.timestamp=max(ts), IPs=array_agg_distinct(client.ipAddress,20), ASOrgs=array_agg_distinct(securityContext.asOrg,10), ProxyFlags=array_agg_distinct(securityContext.isProxy,5) by Country=client.geographicalContext.country, State=client.geographicalContext.state, City=client.geographicalContext.city

    | sort -Events

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-okta-02
  title: Okta Clean Human Presence Country Summary
  notes: Successful human-auth-like Okta events with browser and OS present. Use for country/day counts.
  pq: 'serverHost=''okta'' actor.alternateId contains:anycase(''{{entity}}'') outcome.result=''SUCCESS'' client.geographicalContext.country=* client.userAgent.browser=* client.userAgent.os=*

    | filter eventType contains (''user.session.start'',''user.authentication.sso'',''user.authentication.auth_via_mfa'')

    | group DaysActive=estimate_distinct(timebucket(published,''1d'')), Events=count(), IPs=array_agg_distinct(client.ipAddress,20), ASOrgs=array_agg_distinct(securityContext.asOrg,10), ProxyFlags=array_agg_distinct(securityContext.isProxy,5) by Country=client.geographicalContext.country, State=client.geographicalContext.state, City=client.geographicalContext.city

    | sort -DaysActive

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-okta-03
  title: Okta MFA Completions by Country
  notes: MFA completions by country/city. Good supporting evidence that the human user was present during authentication.
  pq: 'serverHost=''okta'' actor.alternateId contains:anycase(''{{entity}}'') outcome.result=''SUCCESS'' client.geographicalContext.country=*

    | filter eventType contains (''mfa.factor.verify'',''user.mfa.okta_verify'',''user.authentication.auth_via_mfa'')

    | group DaysActive=estimate_distinct(timebucket(published,''1d'')), Events=count(), Factors=array_agg_distinct(target.displayName,10), IPs=array_agg_distinct(client.ipAddress,20), ASOrgs=array_agg_distinct(securityContext.asOrg,10) by Country=client.geographicalContext.country, City=client.geographicalContext.city

    | sort -DaysActive

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-okta-04
  title: Okta Daily Country Timeline
  notes: Daily Okta country timeline for residency and travel pattern review.
  pq: 'serverHost=''okta'' actor.alternateId contains:anycase(''{{entity}}'') outcome.result=''SUCCESS'' client.geographicalContext.country=* client.userAgent.browser=* client.userAgent.os=*

    | filter eventType contains (''user.session.start'',''user.authentication.sso'',''user.authentication.auth_via_mfa'')

    | group Countries=array_agg_distinct(client.geographicalContext.country,10), Cities=array_agg_distinct(client.geographicalContext.city,10), ASOrgs=array_agg_distinct(securityContext.asOrg,10), ProxyFlags=array_agg_distinct(securityContext.isProxy,5), IPs=array_agg_distinct(client.ipAddress,20), Events=count() by Day.timestamp=timebucket(published,''1d'')

    | sort -Day.timestamp

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-okta-05
  title: Okta Same Hour Multi Country Activity
  notes: Flags hours where Okta saw successful activity from more than one country. Review for VPN/proxy, travel, or impossible travel.
  pq: 'serverHost=''okta'' actor.alternateId contains:anycase(''{{entity}}'') outcome.result=''SUCCESS'' client.geographicalContext.country=*

    | filter eventType contains (''user.session.start'',''user.authentication.sso'',''user.authentication.auth_via_mfa'')

    | group CountryCount=estimate_distinct(client.geographicalContext.country), Countries=array_agg_distinct(client.geographicalContext.country,10), Cities=array_agg_distinct(client.geographicalContext.city,10), IPs=array_agg_distinct(client.ipAddress,20), ASOrgs=array_agg_distinct(securityContext.asOrg,10), Events=count() by Hour.timestamp=timebucket(published,''1h'')

    | filter CountryCount > 1

    | sort -Hour.timestamp

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-okta-06
  title: Okta Proxy VPN Indicators
  notes: Okta proxy/VPN indicators from security context and IP chain metadata.
  pq: 'serverHost=''okta'' actor.alternateId contains:anycase(''{{entity}}'')

    | filter securityContext.isProxy = true OR request.ipChain.ipDetails.isProxy = true

    | group Events=count(), Countries=array_agg_distinct(client.geographicalContext.country,10), ProxyIPs=array_agg_distinct(request.ipChain.ip,10), ASOrgs=array_agg_distinct(securityContext.asOrg,10) by Day.timestamp=timebucket(published,''1d'')

    | sort -Day.timestamp

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-okta-07
  title: Full Raw Okta Timeline
  notes: Raw Okta timeline with IP, country, AS org, proxy, OS, browser, and IP chain fields.
  pq: 'serverHost=''okta'' actor.alternateId contains:anycase(''{{entity}}'')

    | let ts=(timestamp || published || event.time || sca:ingestTime)

    | sort -ts

    | limit 5000

    | columns Time.timestamp=ts, Actor=actor.alternateId, EventType=eventType, Result=outcome.result, ClientIP=client.ipAddress, ChainIP=request.ipChain.ip, Country=client.geographicalContext.country, ChainCountry=request.ipChain.geographicalContext.country, City=client.geographicalContext.city, State=client.geographicalContext.state, ASOrg=securityContext.asOrg, ChainASOrg=request.ipChain.ipDetails.asOrg, IsProxy=securityContext.isProxy, ChainIsProxy=request.ipChain.ipDetails.isProxy, OS=client.userAgent.os, Browser=client.userAgent.browser, RawUA=client.userAgent.rawUserAgent'
  merge:
    strategy: append
  scope: subject
- id: loc-zpa-01
  title: ZPA Identity Field Check
  notes: Checks which ZPA identity fields match email or username so later ZPA results can be trusted.
  pq: 'serverHost=''zscaler''

    | filter actor.email contains:anycase(''{{username}}'') OR Username contains:anycase(''{{username}}'') OR event.users contains:anycase(''{{username}}'') OR actor.email contains:anycase(''{{entity}}'') OR Username contains:anycase(''{{entity}}'') OR event.users contains:anycase(''{{entity}}'')

    | let ts=(TimestampConnectionStart || timestamp || event.time || sca:ingestTime)

    | group Events=count(), LastSeen.timestamp=max(ts) by ActorEmail=actor.email, Username, EventUsers=event.users

    | sort -Events

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-zpa-02
  title: ZPA Client Public IP Country Summary
  notes: ZPA client public IP country/city summary. Strong supporting evidence for network location.
  pq: 'serverHost=''zscaler''

    | filter actor.email contains:anycase(''{{username}}'') OR Username contains:anycase(''{{username}}'') OR event.users contains:anycase(''{{username}}'') OR actor.email contains:anycase(''{{entity}}'') OR Username contains:anycase(''{{entity}}'') OR event.users contains:anycase(''{{entity}}'')

    | filter ClientCountryCode != null AND ClientCountryCode != ''''

    | let ts=(TimestampConnectionStart || timestamp || event.time || sca:ingestTime)

    | group Sessions=count(), DaysActive=estimate_distinct(timebucket(ts,''1d'')), FirstSeen.timestamp=min(ts), LastSeen.timestamp=max(ts), PublicIPs=array_agg_distinct(ClientPublicIP,20), PrivateIPs=array_agg_distinct(ClientPrivateIP,20), Apps=array_agg_distinct(Application,20) by CountryCode=ClientCountryCode, City=ClientCity

    | sort -DaysActive

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-zpa-03
  title: ZPA Daily Location Timeline
  notes: Daily ZPA countries, public IPs, private IPs, and accessed apps.
  pq: 'serverHost=''zscaler''

    | filter actor.email contains:anycase(''{{username}}'') OR Username contains:anycase(''{{username}}'') OR event.users contains:anycase(''{{username}}'') OR actor.email contains:anycase(''{{entity}}'') OR Username contains:anycase(''{{entity}}'') OR event.users contains:anycase(''{{entity}}'')

    | filter ClientCountryCode != null AND ClientCountryCode != ''''

    | let ts=(TimestampConnectionStart || timestamp || event.time || sca:ingestTime)

    | group Countries=array_agg_distinct(ClientCountryCode,10), PublicIPs=array_agg_distinct(ClientPublicIP,20), PrivateIPs=array_agg_distinct(ClientPrivateIP,20), Apps=array_agg_distinct(Application,20), Sessions=count() by Day.timestamp=timebucket(ts,''1d'')

    | sort -Day.timestamp

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-zpa-04
  title: ZPA High Volume Sessions
  notes: High byte ZPA sessions by client country/city and app. Useful for work-session corroboration.
  pq: 'serverHost=''zscaler''

    | filter actor.email contains:anycase(''{{username}}'') OR Username contains:anycase(''{{username}}'') OR event.users contains:anycase(''{{username}}'') OR actor.email contains:anycase(''{{entity}}'') OR Username contains:anycase(''{{entity}}'') OR event.users contains:anycase(''{{entity}}'')

    | filter ZENTotalBytesTxClient > 10000000

    | let ts=(TimestampConnectionStart || timestamp || event.time || sca:ingestTime)

    | sort -ts

    | limit 1000

    | columns Time.timestamp=ts, ActorEmail=actor.email, Username, EventUsers=event.users, Country=ClientCountryCode, City=ClientCity, ClientPublicIP, ClientPrivateIP, App=Application, AppGroup, BytesSent=ZENTotalBytesTxClient, BytesRecv=ZENTotalBytesRxClient, Status=ConnectionStatus, Reason=InternalReason'
  merge:
    strategy: append
  scope: subject
- id: loc-zpa-05
  title: ZPA Expected Country Drilldown
  notes: Drilldown for expected country code. Default placeholder is {{expected_country_code}}, for example GB.
  pq: 'serverHost=''zscaler''

    | filter actor.email contains:anycase(''{{username}}'') OR Username contains:anycase(''{{username}}'') OR event.users contains:anycase(''{{username}}'') OR actor.email contains:anycase(''{{entity}}'') OR Username contains:anycase(''{{entity}}'') OR event.users contains:anycase(''{{entity}}'')

    | filter ClientCountryCode = ''{{expected_country_code}}''

    | let ts=(TimestampConnectionStart || timestamp || event.time || sca:ingestTime)

    | sort -ts

    | limit 1000

    | columns Time.timestamp=ts, ActorEmail=actor.email, Username, EventUsers=event.users, Country=ClientCountryCode, City=ClientCity, ClientPublicIP, ClientPrivateIP, Lat=ClientLatitude, Lon=ClientLongitude, App=Application, AppGroup, BytesSent=ZENTotalBytesTxClient, BytesRecv=ZENTotalBytesRxClient, Status=ConnectionStatus, Reason=InternalReason'
  merge:
    strategy: append
  scope: subject
- id: loc-zpa-06
  title: Raw ZPA Session Timeline
  notes: Raw ZPA timeline for public IP and country attribution.
  pq: 'serverHost=''zscaler''

    | filter actor.email contains:anycase(''{{username}}'') OR Username contains:anycase(''{{username}}'') OR event.users contains:anycase(''{{username}}'') OR actor.email contains:anycase(''{{entity}}'') OR Username contains:anycase(''{{entity}}'') OR event.users contains:anycase(''{{entity}}'')

    | let ts=(TimestampConnectionStart || timestamp || event.time || sca:ingestTime)

    | sort -ts

    | limit 5000

    | columns Time.timestamp=ts, ActorEmail=actor.email, Username, EventUsers=event.users, Country=ClientCountryCode, City=ClientCity, ClientPublicIP, ClientPrivateIP, Lat=ClientLatitude, Lon=ClientLongitude, App=Application, AppGroup, BytesSent=ZENTotalBytesTxClient, BytesRecv=ZENTotalBytesRxClient, Status=ConnectionStatus, Reason=InternalReason'
  merge:
    strategy: append
  scope: subject
- id: loc-edr-01
  title: Recent Endpoint IP Connections
  notes: Raw IP Connect events for target endpoint/agent. Strong endpoint-native evidence.
  pq: '| filter((endpoint.name contains:anycase(''{{hostname}}'') OR agent.uuid == ''{{agent_uuid}}'') AND event.type == ''IP Connect'')

    | let ts=(timestamp || event.time || published || sca:ingestTime)

    | sort -ts

    | limit 2000

    | columns Time.timestamp=ts, EventID=event.id, AgentUUID=agent.uuid, Endpoint=endpoint.name, Storyline=src.process.storyline.id, User=src.process.user, Cmdline=src.process.cmdline, ImagePath=src.process.image.path, Direction=event.network.direction, Protocol=event.network.protocolName, Status=event.network.connectionStatus, SrcIP=src.ip.address, SrcPort=src.port.number, DstIP=dst.ip.address, DstPort=dst.port.number'
  merge:
    strategy: append
  scope: subject
- id: loc-edr-02
  title: Daily Endpoint Native LAN Evidence
  notes: Daily local source-IP evidence for device presence. Use for defensible day counting.
  pq: '| filter((endpoint.name contains:anycase(''{{hostname}}'') OR agent.uuid == ''{{agent_uuid}}'') AND event.type == ''IP Connect'' AND src.ip.address=*)

    | let ts=(timestamp || event.time || published || sca:ingestTime)

    | group Events=count(), SrcIPs=array_agg_distinct(src.ip.address,50), DstIPs=array_agg_distinct(dst.ip.address,100), Processes=array_agg_distinct(src.process.image.path,50) by Day.timestamp=timebucket(ts,''1d''), Endpoint=endpoint.name, User=src.process.user

    | sort Day.timestamp, Endpoint

    | limit 2000'
  merge:
    strategy: append
  scope: subject
- id: loc-edr-03
  title: LAN Source IP Fingerprint Summary
  notes: Recurring private/source IP fingerprint by endpoint and user.
  pq: '| filter((endpoint.name contains:anycase(''{{hostname}}'') OR agent.uuid == ''{{agent_uuid}}'') AND event.type == ''IP Connect'' AND src.ip.address=*)

    | let ts=(timestamp || event.time || published || sca:ingestTime)

    | group FirstSeen.timestamp=min(ts), LastSeen.timestamp=max(ts), Days=estimate_distinct(timebucket(ts,''1d'')), Events=count(), Processes=array_agg_distinct(src.process.image.path,25), DstIPs=array_agg_distinct(dst.ip.address,50) by Endpoint=endpoint.name, User=src.process.user, SrcIP=src.ip.address

    | sort -Days

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-edr-04
  title: Local LAN Discovery Evidence
  notes: mDNS/NetBIOS/local discovery traffic that supports physical LAN presence.
  pq: '| filter(endpoint.name contains:anycase(''{{hostname}}'') OR agent.uuid == ''{{agent_uuid}}'')

    | filter(src.process.name contains:anycase(''netbiosd'') OR src.process.image.path contains:anycase(''netbiosd'') OR dst.port.number in (137,138,5353) OR dst.ip.address in (''224.0.0.251'',''ff02::fb''))

    | let ts=(timestamp || event.time || published || sca:ingestTime)

    | group Days=estimate_distinct(timebucket(ts,''1d'')), Events=count(), SrcIPs=array_agg_distinct(src.ip.address,50), DstIPs=array_agg_distinct(dst.ip.address,100) by Endpoint=endpoint.name, User=src.process.user

    | sort -Days

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-edr-05
  title: Local Private Network Targets
  notes: Private RFC1918 LAN targets reached by the endpoint. Helpful for network-context evidence.
  pq: '| filter((endpoint.name contains:anycase(''{{hostname}}'') OR agent.uuid == ''{{agent_uuid}}'') AND event.type == ''IP Connect'')

    | filter((dst.port.number == 7000 OR event.network.protocolName == ''mdns'' OR dst.port.number in (137,138,5353)) AND (dst.ip.address contains ''192.168.'' OR dst.ip.address contains ''10.'' OR dst.ip.address contains ''172.16.'' OR dst.ip.address contains ''172.17.'' OR dst.ip.address contains ''172.18.'' OR dst.ip.address contains ''172.19.'' OR dst.ip.address contains ''172.20.'' OR dst.ip.address contains ''172.21.'' OR dst.ip.address contains ''172.22.'' OR dst.ip.address contains ''172.23.'' OR dst.ip.address contains ''172.24.'' OR dst.ip.address contains ''172.25.'' OR dst.ip.address contains ''172.26.'' OR dst.ip.address contains ''172.27.'' OR dst.ip.address contains ''172.28.'' OR dst.ip.address contains ''172.29.'' OR dst.ip.address contains ''172.30.'' OR dst.ip.address contains ''172.31.''))

    | let ts=(timestamp || event.time || published || sca:ingestTime)

    | group FirstSeen.timestamp=min(ts), LastSeen.timestamp=max(ts), Events=count(), Ports=array_agg_distinct(dst.port.number,20), SourceIPs=array_agg_distinct(src.ip.address,20), Processes=array_agg_distinct(src.process.image.path,20) by Day.timestamp=timebucket(ts,''1d''), LocalTargetIP=dst.ip.address

    | sort -Day.timestamp

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-edr-06
  title: Non Zscaler Outgoing Connections
  notes: Outgoing endpoint connections excluding Zscaler processes. Useful for local network and direct egress review.
  pq: '| filter((endpoint.name contains:anycase(''{{hostname}}'') OR agent.uuid == ''{{agent_uuid}}'') AND event.type == ''IP Connect'' AND event.network.direction == ''OUTGOING'')

    | filter(!(src.process.image.path contains:anycase ''Zscaler''))

    | let ts=(timestamp || event.time || published || sca:ingestTime)

    | sort -ts

    | limit 2000

    | columns Time.timestamp=ts, Endpoint=endpoint.name, User=src.process.user, ImagePath=src.process.image.path, Cmdline=src.process.cmdline, SrcIP=src.ip.address, SrcPort=src.port.number, DstIP=dst.ip.address, DstPort=dst.port.number, Protocol=event.network.protocolName, Status=event.network.connectionStatus'
  merge:
    strategy: append
  scope: subject
- id: loc-edr-07
  title: VPN Tunnel Process Evidence
  notes: Endpoint process evidence of VPN/tunnel tooling, including Zscaler and personal VPN tools.
  pq: '| filter(endpoint.name contains:anycase(''{{hostname}}'') OR agent.uuid == ''{{agent_uuid}}'' OR src.process.user contains:anycase(''{{username}}''))

    | filter(src.process.image.path contains:anycase(''globalprotect'',''vpn'',''forticlient'',''openvpn'',''nordvpn'',''expressvpn'',''mullvad'',''wireguard'',''zscaler'',''anyconnect'') OR src.process.cmdline contains:anycase(''vpn'',''tunnel'',''globalprotect'',''anyconnect'',''zscaler'') OR src.process.name contains:anycase(''globalprotect'',''vpn'',''forticlient'',''openvpn'',''nordvpn'',''expressvpn'',''mullvad'',''wireguard'',''zscaler'',''anyconnect''))

    | let ts=(timestamp || event.time || published || sca:ingestTime)

    | sort -ts

    | limit 1000

    | columns Time.timestamp=ts, EventType=event.type, Endpoint=endpoint.name, User=src.process.user, Process=src.process.name, ImagePath=src.process.image.path, Cmdline=src.process.cmdline'
  merge:
    strategy: append
  scope: subject
- id: loc-edr-08
  title: Interactive Endpoint Activity
  notes: Login, unlock, loginwindow, and similar interactive endpoint evidence.
  pq: '| filter(endpoint.name contains:anycase(''{{hostname}}'') OR agent.uuid == ''{{agent_uuid}}'' OR src.process.user contains:anycase(''{{username}}'') OR event.login.userName contains:anycase(''{{username}}''))

    | filter(event.type contains:anycase(''logon'') OR event.type contains:anycase(''login'') OR event.type contains:anycase(''unlock'') OR src.process.cmdline contains:anycase(''unlock'') OR src.process.cmdline contains:anycase(''loginwindow'') OR event.login.userName=*)

    | let ts=(timestamp || event.time || published || sca:ingestTime)

    | sort -ts

    | limit 2000

    | columns Time.timestamp=ts, Endpoint=endpoint.name, User=src.process.user, LoginUser=event.login.userName, EventType=event.type, Process=src.process.name, Cmdline=src.process.cmdline'
  merge:
    strategy: append
  scope: subject
- id: loc-art-01
  title: Windows Timezone Registry Changes
  notes: Windows timezone registry evidence. Useful when available; absence is not conclusive.
  pq: '| filter(endpoint.name contains:anycase(''{{hostname}}'') OR agent.uuid == ''{{agent_uuid}}'' OR src.process.user contains:anycase(''{{username}}''))

    | filter(event.type contains:anycase(''Registry'') OR event.type == ''Registry Modification'')

    | filter(tgt.registry.keyPath contains:anycase(''TimeZoneInformation''))

    | let ts=(timestamp || event.time || published || sca:ingestTime)

    | sort -ts

    | limit 1000

    | columns Time.timestamp=ts, Endpoint=endpoint.name, AgentUUID=agent.uuid, User=src.process.user, RegKey=tgt.registry.keyPath, Value=tgt.registry.value, Process=src.process.name'
  merge:
    strategy: append
  scope: subject
- id: loc-art-02
  title: Windows WLAN Network Profile Registry Writes
  notes: Windows WLAN/network profile registry writes may indicate network changes or new Wi-Fi profiles.
  pq: '| filter(endpoint.name contains:anycase(''{{hostname}}'') OR agent.uuid == ''{{agent_uuid}}'' OR src.process.user contains:anycase(''{{username}}''))

    | filter(event.type contains:anycase(''Registry'') OR event.type == ''Registry Modification'')

    | filter(tgt.registry.keyPath contains:anycase(''NetworkList'',''Profiles'',''WlanSvc''))

    | let ts=(timestamp || event.time || published || sca:ingestTime)

    | sort -ts

    | limit 1000

    | columns Time.timestamp=ts, Endpoint=endpoint.name, AgentUUID=agent.uuid, User=src.process.user, RegKey=tgt.registry.keyPath, Value=tgt.registry.value, Process=src.process.name'
  merge:
    strategy: append
  scope: subject
- id: loc-art-03
  title: macOS Timezone Artifacts
  notes: macOS timezone/localtime file evidence.
  pq: '| filter(endpoint.name contains:anycase(''{{hostname}}'') OR agent.uuid == ''{{agent_uuid}}'' OR src.process.user contains:anycase(''{{username}}''))

    | filter(event.type in:anycase(''File Modification'',''File Creation''))

    | filter(tgt.file.path contains:anycase(''/Library/Preferences/com.apple.timezone'',''/etc/localtime'',''timezone''))

    | let ts=(timestamp || event.time || published || sca:ingestTime)

    | sort -ts

    | limit 1000

    | columns Time.timestamp=ts, Endpoint=endpoint.name, User=src.process.user, File=tgt.file.path, Process=src.process.name'
  merge:
    strategy: append
  scope: subject
- id: loc-art-04
  title: macOS WiFi Airport Preference Changes
  notes: macOS Wi-Fi preference changes and known network files.
  pq: '| filter(endpoint.name contains:anycase(''{{hostname}}'') OR agent.uuid == ''{{agent_uuid}}'' OR src.process.user contains:anycase(''{{username}}''))

    | filter(event.type in:anycase(''File Modification'',''File Creation''))

    | filter(tgt.file.path contains:anycase(''com.apple.wifi.known-networks'',''com.apple.airport.preferences'',''NetworkInterfaces''))

    | let ts=(timestamp || event.time || published || sca:ingestTime)

    | sort -ts

    | limit 1000

    | columns Time.timestamp=ts, Endpoint=endpoint.name, User=src.process.user, File=tgt.file.path, Process=src.process.name'
  merge:
    strategy: append
  scope: subject
- id: loc-zia-01
  title: ZIA User Country Summary
  notes: ZIA country summary by destination country and device hostname. Supports web-location review but may reflect destination country, not user physical country.
  pq: 'serverHost=''zia'' event.user contains:anycase(''{{entity}}'')

    | let ts=(event.datetime || timestamp || sca:ingestTime)

    | group Events=count(), FirstSeen.timestamp=min(ts), LastSeen.timestamp=max(ts), UploadBytes=sum(event.outbytes || 0), DownloadBytes=sum(event.inbytes || 0), Apps=array_agg_distinct(event.appname,20) by DestCountry=event.destcountry, Device=event.devicehostname

    | sort -Events

    | limit 1000'
  merge:
    strategy: append
  scope: subject
- id: loc-zia-02
  title: ZIA Raw User Timeline
  notes: Raw ZIA timeline for subject user with device, app, destination country, and URL details.
  pq: 'serverHost=''zia'' event.user contains:anycase(''{{entity}}'')

    | let ts=(event.datetime || timestamp || sca:ingestTime)

    | sort -ts

    | limit 5000

