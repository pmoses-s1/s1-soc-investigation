name: Publish Docker image

# Builds the image and publishes it to GitHub Container Registry (GHCR) on version
# tags (v*) or a manual run. Merges to main do NOT auto-publish, so :latest moves only
# on a deliberate, reviewed release. Uses the repo's built-in GITHUB_TOKEN.
#   docker pull ghcr.io/pmoses-s1/s1-soc-investigation:latest
#   cut a release with:  git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # QEMU + buildx enable a multi-arch build (linux/amd64 + linux/arm64), so the
      # image runs natively on Intel/AMD and Apple Silicon.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
