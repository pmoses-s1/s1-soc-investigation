name: Publish Docker image

# Builds the image and publishes it to GitHub Container Registry (GHCR) so the app
# installs in one command. Every push to main refreshes :latest, and version tags
# (v*) cut an immutable release. Uses the repo's built-in GITHUB_TOKEN.
#   docker run --rm -p 127.0.0.1:8901:8801 ghcr.io/pmoses-s1/s1-soc-investigation:latest
#   cut a release with:  git tag v0.2.0 && git push origin v0.2.0

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # QEMU + buildx enable a multi-arch build (linux/amd64 + linux/arm64), so the
      # image runs natively on Intel/AMD and Apple Silicon.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          build-args: |
            S1IE_VERSION=${{ github.ref_type == 'tag' && github.ref_name || format('0.3.0+{0}', github.sha) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
